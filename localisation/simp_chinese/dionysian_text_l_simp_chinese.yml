 dionysian_base.3.name: "帝君消逝"
 dionysian_base.3.desc: "两千年以来指引我们的永生者自此沉睡。即使有所预想的人们，事到如今也难免恐慌。或许我们正面临故事的结局。"
 dionysian_base.3.option: "末日将至"

 dionysian_base.5.name: "保皇政变"
 dionysian_base.5.desc: "我们的永生者在政坛根深蒂固，仿若遮天蔽日的巨树不容撼动。众多拥趸甘愿为[Root.Ruler.GetHerHim]誓死奋战，如果试图废除那高高在上的权威，必然招惹报复。"
 dionysian_base.5.option: "确定"
 dionysian_unchangable_authority: "\n§R我们无法接纳独裁或帝制以外的政体§!"

 dionysian_base.9.name: "触碰虚境"
 dionysian_base.9.desc: "魔法于我们而言不是奇幻故事里的空想，超凡术士支配着我们的历史大潮。此等力量的来源有过各种各样的推测：[Root.GetSpeciesName]的信念、[Root.GetRulerTitle]的赠礼、超古代文明的遗物……但真相或许是，我们的法术来自于他方世界，每位御督在升格之时都开拓或发现了现实与虚境之间的永久道路。那片变幻莫测的境界已被揭开面纱，群众的惊奇之情胜于从前的载人航天。[root.GetRulerName]的力量与日俱增，威仪宛若神明，周遭的灵能有如狂风暴雨过后弥留的幽香。"
 dionysian_base.9.option.a: "迷梦初醒"
 dionysian_base.9.option.b: "$dionysian_base.9.option.a$"
 dionysian_base.9.option.c: "[Root.GetRulerTitle]是我们的救主"

 dionysian_base.12.name: "奉献遗珍"
 dionysian_base.12.desc: "或许[dionysian_empire.GetRulerTitle]最初是因先驱文明的遗物，才会得知敕令的秘密。但有一点确凿无疑，分散星海的某些遗珍能与[root.GetRulerName]共鸣，融入[Root.Ruler.GetHerHis]的灵体，强化[Root.Ruler.GetHerHis]的力量。我们是否要将这样的遗珍呈献？"
 dionysian_base.12.option.r_worm_scales: "§Y$r_worm_scales$§!"
 dionysian_base.12.option.r_rubricator: "§Y$r_rubricator$§!"
 dionysian_base.12.option.r_zro_crystal: "§Y$r_zro_crystal$§!"
 dionysian_base.12.option.r_galaxy: "§Y$r_galaxy$§!"
 dionysian_base.12.option.r_plasmic_core: "§Y$r_plasmic_core$§!"
 dionysian_base.12.option.r_continuum: "§Y$r_continuum$§!"
 dionysian_base.12.option.r_time_crystal: "§Y$r_time_crystal$§!"
 dionysian_base.12.option.r_odryskan_crystal: "§Y$r_odryskan_crystal$§!"
 dionysian_base.12.option.r_ancient_sword: "§Y$r_ancient_sword$§!"
 dionysian_base.12.option.r_scfe_music_of_the_universe: "§Y$r_scfe_music_of_the_universe$§!"
 dionysian_base.12.option.r_ziaskehorn_fire: "§Y$r_ziaskehorn_fire$§!"
 dionysian_base.12.option.r_eternal_throne: "§Y$r_eternal_throne$§!"
 dionysian_base.12.option.cancel: "取消"
 dionysian_relics_limit_tooltip: "不是所有遗珍都符合条件"

 dionysian_base.13.name: "隐藏肖像？"
 dionysian_base.13.desc: "[root.GetRulerName]的容貌和性别，在相当长的时间里疑云重重。亲眼见过[dionysian_empire.GetRulerTitle]的侍卫与权贵，曾经都刻意地含糊其辞，避免将其外传。有些保守派宣称，我们不能放弃这种神秘感。"
 dionysian_base.13.option.a: "将肖像替换为[dionysian_empire.GetRulerTitle]的标志"
 dionysian_base.13.option.b: "将肖像替换为空白"
 dionysian_base.13.option.c: "禁止本项议案"
 dionysian_base.13.option.d: "取消"
 dionysian_change_face_tooltip: "§R不可撤销的操作§!\n[root.GetRulerName]的肖像改变了\n"
 dionysian_remain_face_tooltip: "§R不可撤销的操作§!\n永久移除隐藏肖像的决议"

 dionysian_base.17.name: "荣光刺目"
 dionysian_base.17.desc: "我们的[dionysian_empire.GetRulerTitle]历经千年，在星海共同体深得重视。各国首脑聆听[Root.Ruler.GetHerHis]的演讲，王公贵族艳羡[Root.Ruler.GetHerHis]的永恒，蜂群意识近乎将[Root.Ruler.GetHerHis]视作同类。人们隐隐约约有种看法：[root.GetRulerName]就是历史舞台的主角。然而，[Root.Ruler.GetSheHe]又是众所周知地精通战争与阴谋。兴许，[Root.Ruler.GetHerHis]的言行全都暗含复杂的动机。人们很难打消类似疑虑，担忧新一轮的伟大征服。在星海共同体，[dionysian_empire.GetRulerTitle]被崇敬和恐惧。"
 dionysian_base.17.option: "不容忽视"
 dionysian_community_dip: "星海权谋"
 dionysian_community_dip_desc: "[dionysian_empire.GetRulerTitle]在国际上有显著影响。"

 dionysian_base.19.name: "君临星海"
 dionysian_base.19.desc: "如今局面早在许多人的预料之内。两千多年以前，[root.GetRulerName]的大陆帝国交给御督们治理。这些人能按照各自偏好的方式，支配封地和军队，只需为[dionysian_empire.GetRulerTitle]承担少量的责任。后来的漫长岁月里，[Root.Ruler.GetSheHe]逐渐削弱御督特权，加强集权统治。或许同样的历史将在整个河系重演。"
 dionysian_base.19.option: "[root.GetRulerName]的声音无远弗届"

 dionysian_base.21.name: "君临虚境"
 dionysian_base.21.desc: "[root.GetRulerName]已经动身前往[Root.Ruler.GetHerHis]在虚境的皇座，准备将毁灭释放到现实世界。故事接近结局，[Root.Ruler.GetSheHe]赐给我们坚持到底的力量。或许我们会随[Root.Ruler.GetSheHe]一同迈入不朽，将诸神的权能占为己有。或许我们同样不能在以太相引擎的余波里幸存，但是从始至终护送[Root.Ruler.GetHerHis]的升天之路，深感荣幸。"
 dionysian_base.21.option: "以[root.GetRulerName]的名义"

 dionysian_base.29.name: "[dionysian_empire.GetRulerTitle]之伤"
 dionysian_base.29.desc: "[root.GetRulerName]的肉体遭到毁坏，然而[Root.Ruler.GetHerHis]的意识长存虚境。假以时日，[Root.Ruler.GetSheHe]终将重返世界，再临帝国。我们能主动帮助[Root.Ruler.GetSheHe]凝聚力量，加速[Root.Ruler.GetHerHis]的回归。而在激进派看来，我们能趁机击碎[dionysian_empire.GetRulerTitle]的枷锁，击溃[Root.Ruler.GetHerHis]在尘世的追随者，不惜一切代价夺得自由。"
 dionysian_base.29.option.a: "我们迫切需求[Root.Ruler.GetHerHis]的统治"
 dionysian_base.29.option.b: "我们必须维持[Root.Ruler.GetHerHis]的肉身"
 dionysian_base.29.option.c: "我们将会献祭泽珞"
 dionysian_base.29.option.d: "我们将会恭候"
 dionysian_base.29.option.e: "所幸有克隆的备用肉体"
 dionysian_base.29.option.f: "§R摆脱[dionysian_empire.GetRulerTitle]的好时机§!"
 dionysian_revive_overlord_tooltip: "§G[dionysian_empire.GetRulerTitle]会立刻恢复伤势§!\n\n"
 dionysian_lock_overlord_tooltip: "§R[dionysian_empire.GetRulerTitle]会被束缚在维生系统§!\n\n"
 dionysian_revive_overlord_later_tooltip: "[dionysian_empire.GetRulerTitle]会在两年以后恢复伤势\n\n"
 dionysian_kill_overlord_tooltip: "§R[dionysian_empire.GetRulerTitle]与帝国的联系会被切断，将有严重后果§!\n\n"

 #御督相关
 dionysian_base.15.name: "御督崛起"
 dionysian_base.15.desc: "§H升格的长生者§!\n\n御督身居高位、担当要职，全都具备非凡的灵能。但是帝国的派系林立，这些超人积怨已久。倘若要将某一名御督提拔到我们政府的顶端，必须精挑细选。此人堪称其中翘楚，并且被多方青睐，晋升之路没有明显的阻碍。\n"

 dionysian_base.15.a: "你的专属特质提高了维护费。"
 dionysian_base.15.a.response: "没错。御督们在过去就多数是骄奢淫逸的帝国诸侯，尽管到近现代已经被削弱特权。我们又是能存活数百年的长生者，明争暗斗与新仇旧恨有如乱麻、难以理清。普通群众却因科技发展而变得格外敏感和团结，我们未免受其审视和掣肘。\n\n§E§H帝国神统§!飞升天赋能显著减少御督的维护费，但必须先采纳一个其他的飞升天赋。§!\n"
 dionysian_base.15.b: "每种权能的御督只有一位？"
 dionysian_base.15.b.response: "是的。除非我消失于世，否则同类的御督永不出现。这就像是一块封地，目前正被我掌控。\n\n§E§H特质名称§!显示了当前御督的领域。§!\n"
 dionysian_base.15.c: "普通领袖怎样成为御督？"
 dionysian_base.15.c.response: "我们种族有项特质，凡人会在成就伟业的过程中渐渐获得灵能。这是最为常见的飞升之路，我的多数同僚都是由此而来。\n\n§E提高普通领袖的§H技能等级§!，他们会有概率获得§H御督特质。§!\n"
 dionysian_base.15.d: "当前事件会出现多次吗？"
 dionysian_base.15.d.response: "我们都宣誓为[root.GetRulerName]的荣耀而战，但是在具体做法上的分歧比较严重。[dionysian_empire.GetRulerTitle]常常要慎重地运筹帷幄，方能保证某位御督成为帝国臂助。\n\n§E每隔一段时间，就有新的御督能被雇佣。帝制的§H$councilor_dionysian_prime_minister$§!也可能是一位御督。\n"
 dionysian_base.15.e: "你们的初始等级会提高吗？"
 dionysian_base.15.e.response: "我们不够熟悉太空的全新局面，不少人仍然在以过去几百年的惯用思维处理问题。统治大地的法王们不算喜欢科研船，有几位顽固派都拒绝接触电脑。再给我们时间适应，情况终将有所好转。\n\n§E御督的§H初始等级§!会随时间推移而提高。§!\n"

 dionysian_base.15.destiny: "§Y掌控命运似乎挺是惬意。§!"
 dionysian_base.15.destiny.response: "在我一念之间，行人会被高空坠物砸成肉泥，佳丽俊秀朝着路边乞丐倾诉爱意。我到赌场能接二连三大赚特赚，想中彩票也绝非难事。但我同样会碰到意料之外的状况，不清楚那究竟是纯粹的偶然，还是自己在无意当中发动了灵能。或许因果性只是种错觉，我从很久以前就略有此感。"
 dionysian_base.15.time: "§Y你能在多大程度上操纵时间？§!"
 dionysian_base.15.time.response: "最典型的应用方式是回溯时间，我能将此次谈话重演几十遍，渐渐斟酌出让听众反响最佳的措辞。常人只在游戏里有所谓存档和读档，我则在现实中反复体验类似的机制。我有算无遗策的政治美名，谈恋爱也几乎次次得手。但我不敢表现得太过随性，终究无法保证每时每刻都滴水不漏。历史上的第一位时间御督伊凯克斯，曾经用他的力量去刻意讨取[dionysian_empire.GetRulerTitle]的青睐。这样无礼的招数被识破了，他当夜就被暗影御督奉命刺杀。"
 dionysian_base.15.sercets: "§Y你是读心者？§!"
 dionysian_base.15.sercets.response: "相同称号的御督，在力量和人格上仍然会有或多或少的差异。从前有两位机密御督就大相径庭：柯林德是帝国最早的间谍主管，他的耳朵能窃听身旁之人的心声，黑眸能阅览眼前之人的往事；尼拉特是臭名昭著的噬魂怪物，他能直接掠夺被害者的全部记忆，后来渐渐地人格分裂。我介于这两位前辈之间，具体能力暂且保密如何？"
 dionysian_base.15.stone: "§Y操控岩石的能力真是刚正朴实。§!"
 dionysian_base.15.stone.response: "历代的盘岩御督都是稳扎稳打的强者，鲜有同僚能与我们正面抗衡。我们麾下学徒也同样可靠，帝国有过粉碎城墙、撕裂山脉的撼地法师，有过每位成员都是石头巨人的塑石骑士。我们这派的传统形象也从不显得木讷，两千年前的御督凯林就向来反常。他出名之前是个深山野人，他寡言少语地为[dionysian_empire.GetRulerTitle]奋战，他最后在即将获胜的战场上叛离了[dionysian_empire.GetRulerTitle]。他变形为高耸的泰坦到处横冲直撞，因而被[root.GetRulerName]的地震敕令所埋葬。这或许是如他所愿的结局？"
 dionysian_base.15.fire: "§Y烈焰御督像是热门头衔。§!"
 dionysian_base.15.fire.response: "火之符印的历史悠久，在帝国诞生前就被各方列国广泛研究。它或许是最早被我们所掌握的法术，或者说灵能。然而，看管烈焰的御督往往短命，因为众多法师当中时不时有个天才崛起。这方面的典例是千烬和阳炎女王，两人的决战之地有条岩浆长河绵延至今。现在已经不容忍诸如此类的生死夺权，那道熊熊燃烧的伤痕也变成了旅游景点。"
 dionysian_base.15.wind: "§Y风之力有什么用处？§!"
 dionysian_base.15.wind.response: "我能化身为头顶天空脚踏大地的龙卷，能分解为一瞬之间抚弄万物的阵风，能乘坐着云朵到处漂流……我甚至能同时做到三件事，将来或许能将行星吹离轨道。但随着科技发展，魔法确实有沦为古董的迹象。我们必须追寻更强的力量，否则早晚会被凡人轻视、推翻、遗忘。"
 dionysian_base.15.entropy: "§Y你掌控的领域是熵？§!"
 dionysian_base.15.entropy.response: "我的学徒能锈蚀刀剑和裂解飞船，我的手指能将啼哭的婴孩变作啼哭的老翁。这其实未必要以“熵”形容，反倒有些更加合适的字眼。但是凡人的信念，会在一定程度上影响我们的灵能和肉身。某些御督在数百年里深受恐惧，就连外表都逐渐地转变成怪物。主要来说，御督的称号不是为了反映事实，而是为了引导群众，这就和政治宣传差不多。"
 dionysian_base.15.dream: "§Y你怎样看待梦境？§!"
 dionysian_base.15.dream.response: "我的睡梦是随心所欲的境界，是恒久的诱惑。两千年以前的梦境御督麦格诺就沉迷睡觉，时常在幻觉里和亲友相聚，他是最早被[dionysian_empire.GetRulerTitle]宣判渎职的权臣。但鉴于他很少参与我们帝国的血腥现实，他可能又是最接近清白无辜的人。"
 dionysian_base.15.war: "§Y战争之王，真是光荣。§!"
 dionysian_base.15.war.response: "纵观历史上的几位战争御督，禁军统帅阿伽松、蛮族酋长血冢、藐厌军的领袖艾什……都是跨过尸山血海而超凡入圣的，后来也都为[dionysian_empire.GetRulerTitle]制造过无数屠杀。但是阿伽松的忠诚永载史册，血冢的勇猛威震世间，格雷文·艾什能记住军队里每位士兵的名姓，用法术将他们承受的创伤转移给自身。我们都有着英雄的某个侧面，这种评价应当不错。"
 dionysian_base.15.justice: "§Y你怎样理解正义？§!"
 dionysian_base.15.justice.response: "以前，这个问题的标准答案是正义存在于[dionysian_empire.GetRulerTitle]的旨意。最初的律法御督，宣判者屠农，就是全心全意服侍[dionysian_empire.GetRulerTitle]的机器，近乎弃绝私欲的半神。我崇敬此人的奉献，他四百多年里都保持严肃无情的语调，佩戴面具以遮盖表情。但如今来看，正义的概念不应当被垄断。我能肯定这点。"
 dionysian_base.15.rebirth: "§Y引导活力的御督，令人欣慰。§!"
 dionysian_base.15.rebirth.response: "我的前任者多半是救死扶伤的医师，所过之处万物复苏。不过凡事总有特例：“遗孤稳婆”的治愈力量有时会让患者陷入癫狂，艺术家特莉亚能为动植物暂时注入灵性。我们也往往和[dionysian_empire.GetRulerTitle]关系恶劣，历史上制造了最多死伤的人物无疑是[Root.Ruler.GetSheHe]。曾有几位苏生御督因为一点小错就被永久监禁和抽取力量。"
 dionysian_base.15.song: "§Y音乐当中有怎样的力量？§!"
 dionysian_base.15.song.response: "情绪、信念、想象、回忆，都是我所能篡改的事物。我的悄声暗示会让听者迫切服从，我的音乐专辑潜移默化地塑造着集体精神。从前有位瑶音御督，希琳尝试命令过[dionysian_empire.GetRulerTitle]拔剑自杀，险些成功。她自小被父亲当成敛财工具，后来被卖进皇宫，更是如履薄冰。"
 dionysian_base.15.virus: "§Y什么人会成为病毒的主宰？§!"
 dionysian_base.15.virus.response: "病毒御督普遍是不同程度的反社会变态。其中名声最坏的是“瘟疫修道院”的缔造者特尔，他在[dionysian_empire.GetRulerTitle]的默许下，使用平民开展实验。他自称这样做是为了灭绝人性，追求冷酷无情的境界。他和烈焰御督“自焚圣师”交战时兵败被杀，我尽量引以为戒。"
 dionysian_base.15.shadows: "§Y暗影应该是刺客的领域？§!"
 dionysian_base.15.shadows.response: "我的前辈们杀过最多的御督，不计其数的无名小卒。我们很少在明处掌管军政。经由贤者兰特里所写的历史著作，其中一位暗影御督布里登·马克才广为人知。他曾经行刺[dionysian_empire.GetRulerTitle]，没能成功得手，转而为其效忠。他兼具致命的技艺和迷人的风度，在后世有不少仰慕者。"
 dionysian_base.15.slavery: "§Y支配像是[dionysian_empire.GetRulerTitle]的领域。§!"
 dionysian_base.15.slavery.response: "将[dionysian_empire.GetRulerTitle]称作御督，就如同将御督称作凡人，放在从前会被割去舌头。不过，[dionysian_empire.GetRulerTitle]显然像是支配或暴政的御督。[Root.Ruler.GetSheHe]容忍我这种御督存在于世，或许是为了转移群众的仇恨。[Root.GetRulerName]试图将自己塑造成监禁和驱策猛兽的人，没有[Root.Ruler.GetSheHe]的约束，某些更残暴的超凡者会肆无忌惮地奴役众生。我无论是否情愿都得扮演反派角色，这是我的无力之处。"
 dionysian_base.15.wisdom: "§Y理智御督大约是智慧之人？§!"
 dionysian_base.15.wisdom.response: "我的前辈们是学者哲人居多，各家各派的宗师，乃至文明进步的先知。[dionysian_empire.GetRulerTitle]的理念和帝国的宏图，都受过我们的重要影响。但[Root.GetRulerName]在这个方面也是一如既往的狡猾，[Root.Ruler.GetSheHe]有时能恰到好处地歪曲贤哲的学说，或者仅仅接纳其中的某些内容，使其为自身利益服务。"
 dionysian_base.15.frost: "§Y你有座冰封的宫殿吗？§!"
 dionysian_base.15.frost.response: "我高兴时会召来降雪，这样大家都会知道。我在庆典时会创造出凤凰和巨龙之类的冰雕，然后放它们到城市上空舞动。我掌控的元素在太空时代，已经没有多么强大的破坏力。但我试着追求艺术性，也能活得惬意，至少不会道德败坏。历史上有位寒霜御督，他的宫殿里摆满冻结的美人，都是从各地搜罗的收藏品。"
 dionysian_base.15.death: "§Y死亡之主，也许恶名远扬？§!"
 dionysian_base.15.death.response: "有些人会将亲友的离世归咎于我，有些自杀者会在将死之际诅咒我。但我有些欢迎类似的恶名，因为来自世人的恐惧能助长我们御督的力量。我的某些同僚担忧自己会在太空时期丧失权势，我不必为此苦恼。当代人还是难逃一死。"
 dionysian_base.15.light: "§Y荣幸备至，沐光的王者。§!"
 dionysian_base.15.light.response: "恐惧黑暗近乎是生物的天性，我的前任者在群众眼里的形象历来不错。曾有几位光明御督的皮肤圣洁无暇，言谈举止仿若天神。但这点未必意味着我们富有美德，只是更容易获取到政治资源。我们多数都对[dionysian_empire.GetRulerTitle]屈膝，在权力斗争当中和其他御督没有本质区别。"
 dionysian_base.15.thunder: "§Y掌控雷霆，像是震撼人心的能力。§!"
 dionysian_base.15.thunder.response: "我能以滚滚雷鸣宣告自己的名字，就像传统的雷神。我也能流连于无边无际的电路，因为最近几百年的科学革命让人们被各式各样的机器设备包围。近现代社会诞生出了不少前所未有的御督，诸如网络御督和游戏御督。我这传承已久的老派招数随之更新，也算惊奇。"
 dionysian_base.15.forge: "§Y铸造的奥秘应该有漫长的历史？§!"
 dionysian_base.15.forge.response: "魂铸师确实在很久以前就为帝国打造武器盔甲，这些人使用法术仪式来拓展感官，将铁锤和锻炉都变成操纵自如的额外肢体。铸炉的御督当然更强，我们能够精确控制几座工厂的所有细枝末节，仿佛机器蜂群意识。历史上真的有三位御督抛弃肉身，将意识转移到地底深处的大熔炉上度过余生，因此在那里能熔炼出极其强韧的钢铁。"
 dionysian_base.15.temptation: "§Y诱惑有哪些形式？§!"
 dionysian_base.15.temptation.response: "这也太一言难尽了，不如问灵魂有多么幽深复杂险恶。我和既往的眩惑御督们一样，都是或多或少的卖身卖艺之人。我有时觉得世界庸俗难耐，有时又觉得到处都是纯真的孩童，放声哭求稀奇古怪的礼物。我尽量满足他们，因为这是天赋的权力，就像魔鬼生来要将凡人带向歧路。"
 dionysian_base.15.order: "§Y秩序的力量谅必会对帝国大有助益。§!"
 dionysian_base.15.order.response: "帝国在公元400年左右就已经横跨大陆，如何将其妥善管理可谓是自古以来的难题。许多御督都是在领地内纵情享乐的诸侯，而我的前辈通常是辅佐[dionysian_empire.GetRulerTitle]的宫相。平民百姓当然会认为：我们略带傲慢而又富有智慧，以超人般的深远谋略和细致规划来实现共同体的幸福。我不能说实际情况真是这样，但我会尽力迎合此种期待。"
 dionysian_base.15.hatred: "§Y希望你的恨意会瞄准敌人。§!"
 dionysian_base.15.hatred.response: "我的能力其实挺多样化，激发怒火仅仅是最基本的表现形式，将别人扭曲成残忍嗜杀、恣意性交的野兽和吸血鬼之类更有趣些。我的追随者们一般来说渴望斗争，既不在乎自己的生活是不是体面，也不在乎将猎物杀到灭绝会有什么后果。但我们懂得要对强者卑躬屈膝，我们在[dionysian_empire.GetRulerTitle]衰弱之前定会俯首听命。"
 dionysian_base.15.insight: "§Y灵视者有什么样的能力？§!"
 dionysian_base.15.insight.response: "我们不止能像死亡御督那样提取骷髅的记忆，更能看到某个场所曾发生过的事、得知某个物件的主人有哪些经历。我们适合冒险考古，有些洞察御督因此成就颇丰，然后得到[dionysian_empire.GetRulerTitle]嘉奖，在城堡安享晚年。我或许会重复这种经历，暮年之际在某颗星球的豪宅书写自传。"
 dionysian_base.15.nature: "§Y自然御督也许是环保主义者的领袖？§!"
 dionysian_base.15.nature.response: "近现代兴起的环保运动确实增强了我的力量，甚至改变了我们的一贯作风。古时候的自然御督多半是在沼泽或者森林常年隐居的怪人，名义上服从[dionysian_empire.GetRulerTitle]，实际上和俗世几乎没什么交集。那些前辈与飞禽走兽为伴，静静衰老，大概想象不到后继者会在媒体上演讲，在群星之间航行。"
 dionysian_base.15.foison: "§Y你是丰收的使者？§!"
 dionysian_base.15.foison.response: "用现代的说法，我是个农业专家吧。御督都近乎是某种概念的化身。农业向来构成了文明的基础，我或许不能在正面战场出尽风头，但充裕的粮食无论何时都有作用。以前的时候我还能降灾毒害敌方的粮食，不过星际帝国相距太远，这种法术已经行不通。"
 dionysian_base.15.wealth: "§Y你肯定财产过人。§!"
 dionysian_base.15.wealth.response: "有些人生来就是御督，有些人后来飞升成为御督。天生的财富御督颇为稀罕，我的前辈多数是传奇巨商，逐步积累了震动世间的财富。我们的称号表明社会的不平等，然而我们这条道路在御督当中又是相对平等的。"
 dionysian_base.15.creation: "§Y你是一位杰出的匠师？§!"
 dionysian_base.15.creation.response: "我能将石头炼成黄金，将黄金变作艺术品。倘若帝国没有前赴后继的宗匠御督及其学徒，许多传承至今的宏伟建筑不会存在。我们的力量兴许还能达到更高的层次，重塑整个世界的结构，或者创造新的宇宙。这当然是个长久以来都没能实现的梦想。"
 dionysian_base.15.rifts: "§Y你能控制星界裂隙？§!"
 dionysian_base.15.rifts.response: "我能撕开与闭合极其狭窄的星界细缝，而宇宙中存在着更加宽阔的裂隙。我如果能深入到那里，或许会获得更进一步的飞升，成为星界御督……然后因为威胁过大被[dionysian_empire.GetRulerTitle]抹杀。御督们的实力未必就相近，很久以前有位传奇的御督被六名同僚围攻，死前杀了其中五名。据说，甚至有过能使用敕令的御督。"

 dionysian_archon_become_negative_tooltip: "这位御督有§Y50%§!概率获得一个随机的§R负面特质§!"

 dionysian_archon.100.name: "洞悉命数"
 dionysian_archon.100.desc: "§Y[Root.GetName]§!准备施展宏伟的秘法仪式，完成之时帝国的公民都会隐约预知到各自的运势，感受到将来的幸福苦难还有多少、愿望理想究竟能否实现，就像看见健康体检报告。这样的预感未必准确，法师与灵能者更是有可能将其完全推翻。\n\n反对派担忧此举引发的社会动荡，既然§Y[Root.GetName]§!能使无可计数的群众觉悟到命运，那么[Root.GetSheHe]为什么不能顺带透露这样做的具体结果？"
 dionysian_archon.100.a: "引人期待"
 dionysian_archon.100.b: "禁止实施"
 dionysian_forsee_destiny_ritual: "知命仪式"
 dionysian_forsee_destiny_ritual_desc: "全国范围的占卜仪式大有益处，但某些公民因所知之事而几近崩溃。"

 dionysian_archon.200.name: "最后的回望"
 dionysian_archon.200.desc: "§Y[Root.GetName]§!为[Root.GetHerHis]的魔法符印创造出新的应用方式，能精确模拟受术者经历过的某些情境，揭示他的不同选择都会导致什么样的结果。但是凡夫俗子的心神肉体难以承担法术重负，实验对象多数都在短时间内因此丧生。§Y[Root.GetName]§!不准备将其局限在特殊用途，请求准许其广泛传播。也许有些垂死者会在弥留之际略窥其他的人生，也许有些绝望者会献上一切来纠正过错，哪怕仅仅是在幻觉当中。"
 dionysian_archon.200.a: "遂其所愿"
 dionysian_archon.200.b: "荒唐之举"
 dionysian_view_past: "推演往事"
 dionysian_view_past_desc: "时间御督的符印能使受术者再次经验过去场面并尝试选择其他走向，但这样做会对凡人造成近乎致死的创伤。"

 dionysian_archon.800.name: "梦界创世"
 dionysian_archon.800.desc: "§Y[Root.GetName]§!希望将他的规划付诸实施：联通彼此隔绝的梦境。我们或长或短的美梦噩梦、转瞬即逝的奇思妙想都将被融为一体，构成时时刻刻都在剧变的宏丽世界，就像无边无际的网络。熟睡之人将会无意识地供应原料，清醒之人能借由梦境御督的符印来游览那片疆域，亲睹幻景和虚象，乃至成群结队地冒险探奇。所需的灵能秘仪已经准备停当。"
 dionysian_archon.800.a: "虚拟的度假胜地"
 dionysian_archon.800.b: "一派胡言"
 dionysian_created_dreamworld: "融合梦境"
 dionysian_created_dreamworld_desc: "群众的梦境彼此交织，我们在奇妙的世界里相互理解。"

 dionysian_archon.1200.name: "唤起本愿的歌声"
 dionysian_archon.1200.desc: "§Y[Root.GetName]§!的新作引得普罗大众争论不休，早有传言称陶醉于其中的聆听者会性情大变，从纷乱的往昔回忆、内心世界里寻出本该成为的面貌、本该追求的执念，仿佛经历了漫长的沉思。许多人希望自己能被导回正轨，就此脱离浑浑噩噩的生活，另些人则恐惧自己就连本性都被任意掌控。§Y[Root.GetName]§!尚未表态，也许现状仅仅源自人们对御督能力的过度神化。"
 dionysian_archon.1200.a: "准许传播"
 dionysian_archon.1200.b: "封杀禁绝"
 dionysian_mental_revolution: "精神革命"
 dionysian_mental_revolution_desc: "帝国公民的心智正承受瑶音御督的强烈影响。"

 dionysian_archon.1600.name: "启蒙"
 dionysian_archon.1600.desc: "§Y[Root.GetName]§!正研究备受期待也饱受争议的新符印，凡人能呼请它的力量来暂时获得智械般冷静超脱的思维，压抑自身的焦躁、怀疑、妄执之类，全神贯注于一种预设的目标。有些公民会欣然接受此事，这能提升工作的效率又减轻工作的痛苦，远远胜过寻常的提神饮料。有批评家讽刺这与“理智”的概念背道而驰，说不定不久以后，人们谈恋爱时也会将自己变成机器来稳定表现。"
 dionysian_archon.1600.a: "再好不过"
 dionysian_archon.1600.b: "准许应用"
 dionysian_archon.1600.c: "禁止公布"
 dionysian_focus_sigil: "专注符印"
 dionysian_focus_sigil_desc: "由于理智御督新创造的符印，我们的社会生产效率有所改善，但有不少人的心理状态受到消极影响。"

 dionysian_archon.1700.name: "冻结与消融"
 dionysian_archon.1700.desc: "寒霜御督§Y[Root.GetName]§!认定§Y[dionysian_archon_event_target_planet.star.GetName]§!星系的§Y[dionysian_archon_event_target_planet.GetName]§!是有待雕刻的理想素材，[Root.GetSheHe]的伟力能使梦幻般景象显现于此。栩栩如生的众多冰雕将会升起，或许我们帝国的历史能在那里从头到尾地重演一遍，或许被我们毁灭的敌人也能在那里虚假地延续。§Y[Root.GetName]§!会因此等壮举而在群众内心留下神明似的印象，[Root.GetSheHe]的权威与魔法无疑将随之增长。"
 dionysian_archon.1700.a: "给予许可"
 dionysian_archon.1700.b: "这种力量不如用在环境改造"
 dionysian_archon.1700.c: "真是浪费"
 dionysian_ice_realm: "冰雕艺术"
 dionysian_ice_realm_desc: "寒霜御督前所未有的杰作引得内外注目。"
 dionysian_ice_realm_unity_deposit: "寒冰国度"

 dionysian_archon.1900.name: "织光者"
 dionysian_archon.1900.desc: "§Y[Root.GetName]§!希望将§Y[dionysian_archon_event_target_planet_a.GetName]§!的光明重新塑形，从此以后昼夜将不再取决于星球的运转，而视乎于御督的意愿。[Root.GetSheHe]能唤起冲天的光柱，降下漫天的光雨，乃至释放出璀璨的龙卷风，其所过之处即为白昼、未至之地即为黑夜。各方正窃窃私语，此乃模仿敕令的傲慢之举。"
 dionysian_archon.1900.a: "这毕竟是[Root.GetHerHis]的领域"
 dionysian_archon.1900.b: "将地点转移到§Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.1900.c: "将地点转移到§Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.1900.d: "痴心妄想"
 dionysian_controlled_light: "受缚之光"
 dionysian_controlled_light_desc: "这颗星球的光芒被一位御督纳为己用。"

 dionysian_archon.2000.name: "科技妖精"
 dionysian_archon.2000.desc: "数百年前的科学革命震动帝国时，有些不甘示弱的法师与御督坚称，种种新奇的发明创造都是由受缚灵体在暗中驱动，而非凡俗的产物。如今的轰雷御督§Y[Root.GetName]§!能使这类怪谈成真，[Root.GetHerHis]的符印能将受术者的灵魂暂时封印在机器设备，为其供应能量、提升效率。新的劳动形式会随之出现，劳工只需忍受意识被抽取和禁锢于外物的精神压力，但这样也许是在制造血肉电池。"
 dionysian_archon.2000.a: "此举有助于我们的进化"
 dionysian_archon.2000.b: "值得一试"
 dionysian_archon.2000.c: "罔顾伦理"
 dionysian_efficient_machines: "高效机器"
 dionysian_efficient_machines_desc: "机器运转受益于放弃自由的劳动者。"

 dionysian_archon.2100.name: "铸造泰坦"
 dionysian_archon.2100.desc: "§Y[Root.GetName]§!倾注心血的工作已经大功告成，[Root.GetSheHe]发明的新锐战体能充当列位御督的座驾，每台都根据每人的特征定制，宏伟的机神或是恐怖的魔兽。它们也可以消耗大量能源来单独运行。这些战体的生产需要§Y[Root.GetName]§!亲身参与，[Root.GetHerHis]的政敌责难其暗藏祸心。"
 dionysian_archon.2100.a: "精妙绝伦"
 dionysian_archon.2100.b: "破铜烂铁"
 dionysian_forge_army: "灵能战体"
 dionysian_forge_army_plural: "灵能战体"
 dionysian_forge_army_desc: "专为帝国御督建造的作战平台。"
 dionysian_forge_army_tooltip: "允许在首都建造§Y$dionysian_forge_army$§!陆军部队。\n它们所在的舰队或星球被§Y御督§!领导时，所需的基础维护费减少§Y50%§!。"

 dionysian_archon.2300.name: "隐形的纪律"
 dionysian_archon.2300.desc: "秩序御督§Y[Root.GetName]§!宣称其秘法有助于§Y[dionysian_archon_event_target_planet_a.GetName]§!的繁荣，施展过后当地住民的行为习惯都会在不知不觉间被巧妙修改：更具规律的作息、更加健康的娱乐、更为和谐的交际……未必都是积极正面的变动，有些人会多出一些看似毫无意义实则有益社区的古怪癖好，有些无辜之人会主动前去承担苦劳却以为这是内心所向，有些无能之人会不由自主地渴望辞去工作、甚至结束生命。此举有显而易见的伦理问题，但§Y[Root.GetName]§!承诺从结果上说，殖民地的生产率与安全感会得到最大程度的改善。"
 dionysian_archon.2300.a: "堪称创举"
 dionysian_archon.2300.b: "将地点转移到§Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2300.c: "将地点转移到§Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2300.d: "这种企图应该被谴责"
 dionysian_mystic_rule: "神秘规约"
 dionysian_mystic_rule_desc: "这座殖民地被秩序御督的灵能所标记，住民会在无意间采取有益于全局的行动。"

 dionysian_archon.2400.name: "燔祭"
 dionysian_archon.2400.desc: "诚然，众多公民庆幸于生在我们的帝国，为我们的成就而深感骄傲，乐意为国奉献。但是辛勤劳动未免显得庸碌，争论政治有些虚无缥缈，投身战场又必须要经受磨难。仇怨御督§Y[Root.GetName]§!正希望给无私之人指明一条获得荣耀的捷径，§Y[dionysian_archon_event_target_planet.GetName]§!的受选者们将在灵能仪式中毫无痛苦地消逝，化为帝国的燃料。他们的壮举会融进我们的伟业。"
 dionysian_archon.2400.a: "义不容辞"
 dionysian_archon.2400.b: "实施仪式"
 dionysian_archon.2400.c: "残忍狂徒" 
 dionysian_imperial_martyrs: "殉国祭礼"
 dionysian_imperial_martyrs_desc: "赴死者强化了我们的工业与决心。"
 dionysian_archon.2400.a_tooltips: "殖民地失去§R800§!£pop£人口\n\n"
 dionysian_archon.2400.b_tooltips: "殖民地失去§R500§!£pop£人口\n\n"

 dionysian_archon.2500.name: "历史浏览器"
 dionysian_archon.2500.desc: "§Y[Root.GetName]§!希望应用[Root.GetSheHe]发明的奇异设备，使用者能身临其境地回到往昔的特定时间地点，观看当初的全部过程与真实细节。社会学界显然将从中获益，全新的娱乐活动可能由此诞生，我们的公民能像浏览视频网站一样赏玩古人的生活。不过审查工作格外困难，许多机密难免泄露，官方的历史叙事可能毁于一旦。有些猜疑随之而来，我们的一举一动是否受着无数后人的窥视？"
 dionysian_archon.2500.a: "公开应用"
 dionysian_archon.2500.b: "仅限学术"
 dionysian_archon.2500.c: "拒绝回应"
 dionysian_watch_history_1: "观测历史"
 dionysian_watch_history_1_desc: "我们能身临其境地查看历史事件的细节。"
 dionysian_watch_history_2: "$dionysian_watch_history_1$"
 dionysian_watch_history_2_desc: "$dionysian_watch_history_1_desc$"

 dionysian_archon.2600.name: "融合兽"
 dionysian_archon.2600.desc: "自然御督正开展秘密研究，将帝国的寻常兽类融合为怪异生物。它们需要灵能来维持形态，某些表现令人惊喜也令人担忧，例如多颗头部各具独立意识、少数活动的器官驱动着僵冷的尸体。我们应当定夺这种奇术的应用范围，从实验动物到家庭宠物。"
 dionysian_archon.2600.a: "全力相助"
 dionysian_archon.2600.b: "部分支持"
 dionysian_archon.2600.c: "不予关注"
 dionysian_merge_animals_1: "融合实验"
 dionysian_merge_animals_1_desc: "自然御督的最新实验有益于我们的生物学研究。"
 dionysian_merge_animals_2: "$dionysian_merge_animals_1$"
 dionysian_merge_animals_2_desc: "$dionysian_merge_animals_1$"

 dionysian_archon.2800.name: "空想的财产"
 dionysian_archon.2800.desc: "从古至今有多少穷人寒士渴慕过荣华富贵？§Y[Root.GetName]§!准备开展社会实验，以灵能满足那些极其痴狂的妄想。§Y[dionysian_archon_event_target_planet_a.GetName]§!的民众只要能清楚大胆地构思出自身所求的奢侈事物，它们就会凭空浮现。然而，精神些许松动，厌倦、愧疚、满足之类情绪占据上风时，它们又会一去不回。听闻风声的财迷已是跃跃欲试，急欲体验内心中天堂般的生活。"
 dionysian_archon.2800.a: "令人期待"
 dionysian_archon.2800.b: "将地点转移到§Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2800.c: "将地点转移到§Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2800.d: "我们的公民不是玩具"
 dionysian_materialized_desire: "物欲具现"
 dionysian_materialized_desire_desc: "这颗星球的住民能仅凭意识来创造和维持所求之物。"

 dionysian_archon.2900.name: "活化城市"
 dionysian_archon.2900.desc: "宗匠御督与心灵御督共同呈递蓝图，两者的奥秘能将§Y[dionysian_archon_event_target_planet_a.GetName]§!的众城变作活物。街灯会调节亮度来问候行者，招牌会更改文字来表达情绪，椅子以四足行走，电视与我们交谈，高楼大厦有如机器蜂群般自行生长。但是这些新生之物会伤害我们的公民、背叛我们的帝国吗？"
 dionysian_archon.2900.a: "积极支持"
 dionysian_archon.2900.b: "将地点转移到§Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2900.c: "将地点转移到§Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2900.d: "我们需要更加实际的工程"
 dionysian_living_city: "活化城市"
 dionysian_living_city_desc: "这座殖民地的城市万物都具备一定程度的自我意识和行为能力。"

