 #选举相关
 dionysian_election.0.name: "大选在即"
 dionysian_election.0.desc: "通常来说议会应当每隔10年举行一次大选，由此产生新的[dionysian_empire.GetHeirTitle]与内阁成员。各个党派早已开启宣传机器动员群众，政治热点在新闻媒体越发常见。游行和演讲时而出现在街头巷尾，边缘派系与极端团体略有抬头之势。人心浮动，矛盾迭起，雄辩交错。国家将暂时无暇他顾，刻意的舞弊和操纵则会导致更加严重的后果。\n\n最终赢家必须设法站稳脚跟、控制局势，否则混乱在所难免。"
 dionysian_election.3.name: "紧急选举"
 dionysian_election.3.desc: "由于[dionysian_empire.GetHeirTitle]的离去，继任者必须立刻控制局面。国家团结面临考验，当今政坛遭受动摇。"
 dionysian_election.0.option1: "正常举行选举"
 dionysian_election.0.option2: "保留当前政党"
 dionysian_advance_election_title: "大选在即"

 edict_dionysian_advance_election: "提前举行选举"
 edict_dionysian_advance_election_desc: "宣布解散议会，重新选举。短期之内将无法再这样做。"

 dionysian_PM_compete: "§Y[Root.dionysian_old_PM_lose_chance]%§!机率新的[dionysian_empire.GetHeirTitle]获胜\n§Y[Root.dionysian_old_PM_win_chance]%§!机率当前[dionysian_empire.GetHeirTitle]连任\n\n"
 dionysian_election_resource_1: "§E如果影响力小于100点，帝国会陷入涣散\n§!" 
 dionysian_election_resource_2: "§R如果影响力小于200点，帝国会陷入动荡\n§!"

 dionysian_party_time: "执政任期"
