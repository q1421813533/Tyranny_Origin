 dionysian_archon_full_cyb_desc: "帝君和御督获得§Y$leader_trait_cyborg$§!特质"

 dionysian_archon_half_cyb: "半身义体" 
 dionysian_archon_half_cyb_desc: "帝君和御督获得§Y$leader_trait_limited_cyborg$§!特质"

