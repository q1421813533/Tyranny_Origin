 #起源
 dionysian_origin: "君临大地"
 dionysian_origin_desc: "极少数精英具备超凡脱俗的力量，这一文明是由亘古以来最强的灵能者，永生不朽的帝君所统治。"
 DIONYSIAN_START_SCREEN: "[GetSpeciesName]文明与神秘力量紧密交织，我们当中的少数伟人有着漫长的寿命、非凡的灵能。这些偶然出现的“御督”，近乎决定着社会历史的变化发展、国家民族的兴衰存亡。\n\n永恒的[dionysian_empire.GetRulerTitle]在公元0年建立了延续至今的帝国。[Ruler.GetSheHe]发起的征服战横扫四海八荒，逐步统一了[GetHomeWorldName]。俯首听命的御督跻身统治阶层，拒不服从的御督被迫离群索居。\n\n在中世纪时期，多数邦国都由某位御督管辖，基本各自为政，乃至彼此交战。在近现代，帝国的集权程度逐渐增强，但与此同时又遭到民主革命的冲击。\n\n如今随着超光速引擎的发明，我们眺望的渺远星辰已经触手可及，新章有待谱写。"
 dionysian_origin_death: "希望之死"
 dionysian_origin_death_desc: "随着帝君的消逝，我们必须自谋出路。"
 dionysian_origin_tooltip: "—$SPECIES_TRAITS$ ['trait:trait_dionysian_gene']$NEW_LINE$—统治者特质： ['concept_leader_trait_dionysian_overlord']$NEW_LINE$—$leader_trait_dionysian_overlord$持续增加§r威慑力§!，能借此发动效果强劲的['concept_dionysian_edict']$NEW_LINE$—初始物种的领袖有概率成为各具特长的['concept_dionysian_archon']$NEW_LINE$—$auth_imperial$政体的继承人将会成为每10年选举一次的['concept_dionysian_prime_minister']$NEW_LINE$—可选国民理念：['concept_dionysian_beast_civic']，['concept_dionysian_mage_civic']$NEW_LINE$—无法与§r虚境超主§!签订契约"
 dionysian_origin_tooltip_negative_effects: "—$HOMEWORLD$ 拥有['concept_dionysian_edict_remain']行星修正"
 dionysian_origin_death_tooltip: "—$SPECIES_TRAITS$ §H['trait:trait_dionysian_gene']§!$NEW_LINE$—初始物种的领袖有概率成为各具特长的§H['concept_dionysian_archon']§!$NEW_LINE$"

 dionysian_origin.0.name: "君临大地"
 dionysian_origin.0.desc: "这个种族拥有潜在的灵能力量，被一名永生的灵能者所领导。"
 dionysian_origin_death.0.name: "希望之死"
 dionysian_origin_death.0.desc: "这个种族拥有潜在的灵能力量，曾被一名永生的灵能者所领导。"

 RT_DIONYSIAN_OVERLORD: "帝君"
 RT_DIONYSIN_PM: "执政官"
 gov_dionysian_empire: "议会君主制"
 gov_dionysian_empire_desc: "君权受到议会制约，执政官主导国事，选票体现民意。"
 gov_dionysian_dictatorship: "永恒君主制"
 gov_dionysian_dictatorship_desc: "永存于世的不朽君主支配着政府，国家近乎是私有物。"

 #概念
 concept_leader_trait_dionysian_overlord: "$leader_trait_dionysian_overlord$"
 concept_leader_trait_dionysian_overlord_desc: "$THIS_LEADER_TXT$:$TABBED_NEW_LINE$—§G$IMMORTAL$§!$TABBED_NEW_LINE$—允许获得§I光耀统治者特质§!$TABBED_NEW_LINE$—允许消耗§I遗珍§!以增强自身\n\n$EMPIRE_EFFECTS_TXT$$TABBED_NEW_LINE$—$mod_country_ruler_menace_produces_add$:§G+1§!$TABBED_NEW_LINE$—$mod_country_unity_produces_mult$:§G+10%§!$TABBED_NEW_LINE$—$MOD_PLANET_STABILITY_ADD$:§G+5§!\n\n§L建立帝国、统合母星的永生者，从古至今的强权霸业，深刻塑造着我们的历史和社会。§!"
 concept_dionysian_edict: "敕令"
 concept_dionysian_edict_desc: "敕令是帝君力量的显现。\n—多数敕令能无视距离，给某颗星球致送§r灵能灾难§!\n"
 concept_dionysian_archon: "御督"
 concept_dionysian_archon_desc: "御督是通晓灵能的法王、服侍帝君的权贵，各行各业的精英。这些非凡者的寿命漫长、技艺卓绝且威名显赫。\n—每隔一段时间获得一名御督\n—普通领袖也可能在升级过程中成为御督\n—所有御督的维护费大幅增加，除非采纳飞升天赋['concept_dionysian_imperial_archons']"
 concept_dionysian_prime_minister: "$councilor_dionysian_prime_minister$"
 concept_dionysian_prime_minister_desc: "执政官是帝国体制当中民主成分的结果，定期选举的群众代表。\n—后继者的等级将会与前任执政官相近\n—允许解锁专属的§H内阁席位§!\n—执政官不会在帝国有§H$ethic_fanatic_authoritarian$§!思潮时出现"
 concept_dionysian_beast_civic: "$civic_dionysian_beast_tribe$"
 concept_dionysian_beast_civic_desc: "§E效果：§!\n$civic_dionysian_beast_tribe_effects$\n\n§E修正：§!\n—$MOD_POP_AMENITIES_USAGE_BASE$：§G-10%§!\n\n§L$civic_dionysian_beast_tribe_desc$§!"
 concept_dionysian_edict_remain: "$dionysian_edict_remain_on_captial$"
 concept_dionysian_edict_remain_desc: "—$MOD_HABITABILITY_CEIL$：§R-30%§!\n—$mod_planet_jobs_energy_produces_mult$：§G+10%§!\n\n§L$dionysian_edict_remain_on_captial_desc$§!"
 concept_dionysian_mage_civic: "$civic_dionysian_mage_guild$"
 concept_dionysian_mage_civic_desc: "§E效果：§!\n$civic_dionysian_mage_guild_effects$\n\n§E修正：§!\n$MOD_INTEL_ENCRYPTION_ADD$：§G+1§!\n\n§L$civic_dionysian_mage_guild_desc$§!"
 concept_dionysian_imperial_archons: "$dionysian_imperial_archons$"
 concept_dionysian_imperial_archons_desc: "$MOD_LEADER_SPECIES_EXP_GAIN$：§G+30%§!\n$dionysian_imperial_archons_tooltip$\n§L$dionysian_imperial_archons_desc$§!"
 concept_dionysian_arcane_rise: "$dionysian_arcane_rise$"
 concept_dionysian_arcane_rise_desc: "$dionysian_arcane_rise_tooltip$\n\n§L$dionysian_arcane_rise_desc$§!"

 #飞升天赋
 dionysian_imperial_archons: "帝国神统"
 dionysian_imperial_archons_desc: "帝国的御督颇具个性，而且不乏四五百岁的老派人物。自古以来他们本身的激情欲望、彼此的矛盾冲突，就是帝君最重视的问题之一。太空时代增添了许多变数，我们必须保障这些精英协调工作。"
 dionysian_imperial_archons_tooltip: "御督维护费: §G-200%§!\n御督崛起的§Y平均间隔§!将会缩短\n"
 
 dionysian_arcane_rise: "奥法伟艺"
 dionysian_arcane_rise_desc: "我们从文明伊始就在追寻灵能奥秘，探求随心所欲的境界。魔法仍在呼唤我族的灵魂，囚笼般的现实宇宙将会成为我们的掌中砂砾。"
 dionysian_arcane_rise_tooltip: "每种§Y法师学院§!：每20个人口提供§G+1§!个相应的§Y法师§!岗位\n\n获得§Y$tech_archaeostudies$§!科技以后：\n  每$pop_group_unit$£job_dionysian_enchanter£$job_dionysian_enchanter$产出的£minor_artifacts£$MINOR_ARTIFACTS$：§G+0.2§!\n获得§Y$tech_astral_harvesting$§!科技以后：\n  每$pop_group_unit$£job_dionysian_warlock£$job_dionysian_warlock$产出的£astral_threads£$ASTRAL_THREADS$：§G+0.2§!\n获得§Y$tech_mine_rare_crystals$§!科技以后：\n  每$pop_group_unit$£job_dionysian_alchemist£$job_dionysian_alchemist$产出的£rare_crystals£$rare_crystals$：§G+0.2§!\n获得§Y$tech_mine_volatile_motes$§!科技以后：\n  每$pop_group_unit$£job_dionysian_theurgist£$job_dionysian_theurgist$产出的£volatile_motes£$volatile_motes$：§G+0.2§!\n获得§Y$tech_mine_exotic_gases$§!科技以后：\n  每$pop_group_unit$£job_dionysian_shaman£$job_dionysian_shaman$产出的£exotic_gases£$exotic_gases$：§G+0.2§!\n获得§Y$tech_mine_dark_matter$§!科技以后：\n  每$pop_group_unit$£job_dionysian_arcanist£$job_dionysian_arcanist$产出的£sr_dark_matter£$sr_dark_matter$：§G+0.2§!"

 #特质
 leader_trait_dionysian_overlord: "帝君"
 leader_trait_dionysian_overlord_desc: "§G帝君会随着时间的推移而不断增强力量。§!\n\n[This.Owner.GetSpeciesName]之主，[This.Owner.GetHomeWorldName]的征服者。从古至今的强权霸业，深刻塑造着我们的历史和社会。"
 leader_trait_dionysian_prime_minister: "帝国执政官"
 leader_trait_dionysian_prime_minister_desc: "§G后继者的等级会与当前执政官相近§!\n\n这位领袖殚精竭虑宰治国家。"
 leader_trait_dionysian_unreal: "远离现实"
 leader_trait_dionysian_unreal_desc: "这位领袖目前栖居在虚境，难以干预现实事务。"
 
 councilor_dionysian_prime_minister: "执政官"
 councilor_dionysian_prime_minister_female: "执政官"
 councilor_dionysian_prime_minister_desc: "领导内阁的现任[dionysian_empire.GetHeirTitle]，大权在握地主管政务。"
 councilor_dionysian_prime_minister_unlock_title: "§H来自立宪政体的内阁席位§!"
 councilor_dionysian_prime_minister_conditional_tooltip: "领袖拥有§Y$leader_trait_dionysian_prime_minister$§!特质"

 trait_dionysian_gene: "天赋王权"
 trait_dionysian_gene_desc: "§L这个物种的极少数人能获得非凡的灵能，半神般的长生者时而从群众当中崛起。§!\n"
 trait_dionysian_gene_tooltip: "§G来自这个物种的领袖有概率获得额外的特质和加成§!"

 trait_dionysian_beast: "兽化者"
 trait_dionysian_beast_desc: "§L这个物种精力旺盛、斗志昂扬，而且具有神秘的适应力。§!\n"

 councilor_dionysian_beast_tribe: "兽族酋首"
 councilor_dionysian_beast_tribe_female: "兽族酋首"
 councilor_dionysian_beast_tribe_desc: "兽族当中威望卓著的至高者，指导众多部落。"
 councilor_dionysian_beast_tribe_conditional_tooltip: "领袖的物种拥有§Y$trait_dionysian_beast$§!特质"

 councilor_dionysian_mage_guild: "魔导师"
 councilor_dionysian_mage_guild_female: "魔导师"
 councilor_dionysian_mage_guild_desc: "位居首席的大法师，统辖着规模与特质各异的奥秘组织。"

