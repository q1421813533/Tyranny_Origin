 dionysian_archon_syn_desc: "帝君和御督获得§Y$leader_trait_synthetic$§!特质"

 dionysian_archon_virtual: "虚拟意识"
 dionysian_archon_virtual_desc: "帝君和御督获得§Y$leader_trait_virtual$§!特质"

