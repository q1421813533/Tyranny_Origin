 leader_trait_dionysian_exarch_desc: "这位领袖显露升格的迹象，具备成为御督的潜质，只要其技艺登峰造极。"
 leader_trait_dionysian_archon_common_text: "这位领袖已经升格成为御督，通晓和统御某种方面的灵能。"
 leader_trait_dionysian_archon_destiny_desc: "命运的符印支配因果，命运的御督定夺偶然与必然，统辖希望与绝望。"
 leader_trait_dionysian_archon_time_desc: "时间的符印联系着过去与将来、倒退与进展。时间的御督能动摇历史、预知风云。"
 leader_trait_dionysian_archon_sercets_desc: "机密御督是探查真相与施行阴谋的宗师。[This.GetSheHe]通常领导着众多特务，掌控着帝国的情报网。"
 leader_trait_dionysian_archon_stone_desc: "石之符印能为沙土山丘塑形。盘岩御督能变作活化的高峰，轻易建造和摧毁奇观。"
 leader_trait_dionysian_archon_fire_desc: "火之符印驱使虚境的魔焰，侵蚀金属、融解神智。"
 leader_trait_dionysian_archon_wind_desc: "流风御督控制云气的游动，乃至天穹的运转。"
 leader_trait_dionysian_archon_entropy_desc: "熵之符印关乎衰颓、祸乱、湮殁。熵寂御督是终焉的谕使。"
 leader_trait_dionysian_archon_dream_desc: "这位御督统摄梦境，侵骇沉睡者的心灵世界。"
 leader_trait_dionysian_archon_war_desc: "战争御督的武艺与谋略久经考验。在[This.GetSheHe]的统帅之下，士兵死得其所。"
 leader_trait_dionysian_archon_justice_desc: "律法御督伸张正义，惩戒奸凶。[This.GetSheHe]的宣判会使罪人自食恶果，将整座城市倾覆抹煞。"
 leader_trait_dionysian_archon_rebirth_desc: "苏生御督的灵能驱除伤痛、治愈身心。"
 leader_trait_dionysian_archon_song_desc: "瑶音御督以言语操纵精神，自身也往往是高超的诗人、歌手与艺术家，无需灵能就轻易煽动情绪。"
 leader_trait_dionysian_archon_virus_desc: "这位御督是疾病与瘟疫的主宰者。"
 leader_trait_dionysian_archon_shadows_desc: "暗影御督有幽深莫测的性质与精妙绝伦的技能，是无处不在且一击毙命的刺客大师。"
 leader_trait_dionysian_archon_slavery_desc: "支配御督是残酷压迫的象征，万众俯首听令的统治者。"
 leader_trait_dionysian_archon_wisdom_desc: "这位御督探求现实与虚境的真理，追寻启蒙和教化。"
 leader_trait_dionysian_archon_frost_desc: "冰之符印是关于冻结与静滞的灵知。寒霜御督能将肉体完好无损地封存数百年，能使活物永远意识清醒却永远无法动弹。"
 leader_trait_dionysian_archon_death_desc: "死之符印支配尸体与灵魂。死亡御督统领着森森白骨和幢幢鬼影。"
 leader_trait_dionysian_archon_light_desc: "光之符印涉及到照明、美德、理想。这门技艺能引向伟大的命途。"
 leader_trait_dionysian_archon_thunder_desc: "雷之符印关系到电能，轰雷御督的力量惊天动地。"
 leader_trait_dionysian_archon_forge_desc: "铸炉御督曾是神兵利器的锤炼者，现在是太空战舰的制造者。不断扩张的帝国工业近乎是[This.GetSheHe]身体的延伸。"
 leader_trait_dionysian_archon_temptation_desc: "这位御督掌握幻觉，引领追随者体尝喜乐和痛苦，开启未识之门。"
 leader_trait_dionysian_archon_order_desc: "秩序御督调节世界的运行方式。植物生长的范围，群众作息的路线，季节变化的速度，或多或少受制于[This.GetSheHe]的灵能。"
 leader_trait_dionysian_archon_hatred_desc: "仇怨御督支配着敌意和矛盾。[This.GetSheHe]的来临会激起斗争的欲望，懦夫顿时勇敢，密友暗生嫌隙。"
 leader_trait_dionysian_archon_insight_desc: "这位御督发掘往事，揭示历史真相，重现失落文明。"
 leader_trait_dionysian_archon_nature_desc: "自然御督是德鲁伊般的灵能者，统御草植与兽群。"
 leader_trait_dionysian_archon_foison_desc: "这位御督的统治会使土地肥沃、农物茁壮。"
