 #建筑

 building_dionysian_overlord_sanctum: "帝君圣所"
 building_dionysian_overlord_sanctum_desc: "圣所是专门用于同[dionysian_empire.GetRulerTitle]进行沟通的地方。在此地，荣耀得以彰显，我们谛听[This.Owner.Ruler.GetHerHis]的纶音。"

 building_dionysian_mystic_palace: "奥秘院"
 building_dionysian_mystic_palace_desc: "各种派系的魔法宗师于此悟道参玄，为这门艺术与科学而群策群力。"

 building_dionysian_guild_of_enchanters: "法师学院-时运"
