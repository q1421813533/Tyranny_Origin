 dionysian_edict_damaging_planet: "肆虐的自然灾害"
 dionysian_edict_damaging_planet_desc: "敕令的弥留效果与连锁反应，导致这个世界深陷生态崩溃。"
 dionysian_edict_cooldown: "灾厄能量冷却"
 dionysian_edict_cooldown_desc: "我们不能在这段时间内发动毁灭性的敕令。"
 dionysian_edict_remain_on_captial: "千疮百孔"
 dionysian_edict_remain_on_captial_desc: "§G负面效果能被§Y$council_agenda_dionysian_lift_residual_edicts_name$§!内阁议程逐渐削弱§!\n\n既往两千年的无数战争里，许多敕令被帝君散布在母星。有些仍然在生效，持续招致地震、风暴和火雨之类。"
 dionysian_edict_remain_on_captial_2: "$dionysian_edict_remain_on_captial$"
 dionysian_edict_remain_on_captial_2_desc: "$dionysian_edict_remain_on_captial_desc$"
 dionysian_edict_remain_on_captial_3: "$dionysian_edict_remain_on_captial$"
 dionysian_edict_remain_on_captial_3_desc: "$dionysian_edict_remain_on_captial_desc$"

 council_agenda_dionysian_lift_residual_edicts_name: "解消敕令"
 council_agenda_dionysian_lift_residual_edicts_desc: "多数敕令都有帝君设定的终止条件，例如某座城市的陷落、某条血脉的断绝……这正是少数敕令在母星延续至今的原因，它们的终止条件难以满足。我们需要想方设法找出可能的漏洞、付出必要的牺牲，竭尽所能结束灾难，但这样做无疑也会削弱帝君的恐怖威望。"
 council_agenda_dionysian_lift_residual_edicts_effect: "§Y[This.GetHomeWorldName]§!的§Y$dionysian_edict_remain_on_captial$§!修正：\n—$MOD_HABITABILITY_CEIL$：§G+10%§!"
