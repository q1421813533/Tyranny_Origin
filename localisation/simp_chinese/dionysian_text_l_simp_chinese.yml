 dionysian_base.2.name: "[dionysian_empire.GetRulerTitle]的统治"
 dionysian_base.2.desc.1: "[Root.GetSpeciesName]几经社会变迁、时代更替，[Root.GetRulerName]亦是历尽沧桑、伟绩颇丰。曾有众多理论试图描绘[Root.Ruler.GetHerHis]的真实本性，曾有众多叛乱试图推翻[Root.Ruler.GetHerHis]的超然统治。[Root.GetRulerTitle]也许是莫测的神灵，先驱文明的幸存者，弄虚作假的高明骗徒，已经被英雄击败和顶替的魔王？无论真相如何，[Root.Ruler.GetHerHis]的威望无人能及，[Root.Ruler.GetHerHis]的政策也或多或少有规律可循。\n\n$dionysian_base.2.desc.newlumina_tooltip$"
 dionysian_base.2.desc.2: "帝国在近期的扩张速度是从前无法比拟的，与此同时[dionysian_empire.GetRulerTitle]的声望空前高涨。我们能趁此良机来改革政府，建设更加高效的机构以便实施[Root.Ruler.GetHerHis]的意图。顺势而为将使群众满意，但逆势而行未尝不可。\n\n$dionysian_base.2.desc.newlumina_tooltip$"
 dionysian_base.2.desc.3: "帝国在近期的扩张速度是从前无法比拟的，与此同时[dionysian_empire.GetRulerTitle]的声望空前高涨。我们能趁此良机来改革政府，建设更加高效的机构以便实施[Root.Ruler.GetHerHis]的意图。顺势而为将使群众满意，但逆势而行未尝不可。\n\n$dionysian_base.2.desc.endlumina_tooltip$"
 dionysian_base.2.desc.newlumina_tooltip: "§E§Y$leader_trait_dionysian_overlord$特质§!的§G提升§!与§R劣化§!会影响下次获取§Y光耀者特质§!的时间。§!"
 dionysian_base.2.desc.endlumina_tooltip: "§E§Y[dionysian_empire.GetRulerName]§!不会再由此获得§Y光耀者特质§!。§!"
 dionysian_base.2.option1.a: "§G$leader_trait_legendary_commanding_presence$§!"
