 civic_dionysian_mage_guild_effects: "Can build £building£ §Y$building_dionysian_mystic_palace$§! buildings that add £job_dionysian_arcanist£ §Y$job_dionysian_arcanist$§! Jobs.\nCan build 5 kinds of £building£ §YMage Guild§! buildings that add 5 kinds of £job_dionysian_theurgist£ §YMage§! Jobs.\n£job_dionysian_arcanist£ §Y$job_dionysian_arcanist_plural$§! and £job_dionysian_theurgist£ §YMages§! produce $r_research$, while multiplying the production of certain Resources.\nAfter gaining §Y$tech_global_research_initiative$§! Technology, £building£ §YMage Guild§! can be upgraded.\nOptional Ascension Perk: ['concept_dionysian_arcane_rise']"