 dionysian_base.3.name: "Death of the Overlord"
 dionysian_base.3.desc: "Over the past two thousand years, the immortal who guided us has now fallen into slumber. Even those who anticipated this moment find themselves in inevitable panic. Perhaps we are facing the conclusion of our story."
 dionysian_base.3.option: "The end is nigh"

 dionysian_base.5.name: "The Loyalist Coup"
 dionysian_base.5.desc: "Our immortal ruler holds an entrenched position in politics, akin to an unshakable giant tree overshadowing everything. Many loyalists are willing to fight to the death for [Root.Ruler.GetHerHim]. Attempting to abolish that lofty authority will undoubtedly invite retaliation."
 dionysian_base.5.option: "Confirm"
 dionysian_unchangable_authority: "\n§RWe cannot accept a form of government other than dictatorship or monarchy.§!"

 dionysian_base.9.name: "Touch Shroud"
 dionysian_base.9.desc: "Magic to us is not the fantasy of stories. Mighty sorcerers have shaped the great tides of our history. The source of such power has long been debated: the belief of [Root.GetSpeciesName], a gift from the [Root.GetRulerTitle], relics of an ancient civilization… Yet the truth may be that our spells come from another world. Mabye each Archon opened or discovered a permanent path between the reality and the Shroud at the moment of Ascension. That elusive realm has now been unveiled, and the wonder it inspires among the masses surpasses even that of the first spaceflight. The power of [Root.GetRulerName] grows with each passing day, [Root.Ruler.GetHerHis] majesty akin to that of a god, while the surrounding psionic power lingers like the fragrance after a storm."
 dionysian_base.9.option.a: "We have awakened"
 dionysian_base.9.option.b: "$dionysian_base.9.option.a$"
 dionysian_base.9.option.c: "The Overlord is our savior"

 dionysian_base.12.name: "Absorb Relics"
 dionysian_base.12.desc: "Perhaps the [dionysian_empire.GetRulerTitle] initially learned the secret of Edicts through Relics from a precursor civilization. However, one thing is clear: certain scattered Relics across the stars can resonate with [root.GetRulerName], merging with [Root.Ruler.GetHerHis] spirit, and enhancing [Root.Ruler.GetHerHis] power. Should we present such Relics?"
 dionysian_base.12.option.r_worm_scales: "§Y$r_worm_scales$§!"
 dionysian_base.12.option.r_rubricator: "§Y$r_rubricator$§!"
 dionysian_base.12.option.r_zro_crystal: "§Y$r_zro_crystal$§!"
