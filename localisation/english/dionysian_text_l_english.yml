 dionysian_story.1220.option.14: "Back"

 dionysian_story.1230.name: "Change Aura"
 dionysian_story.1230.desc: "Which domain should we delve into?"
 dionysian_story.1230.option.1: "§P$eater_aura$§!"
 dionysian_story.1230.option.2: "§C$souls_aura$§!"
 dionysian_story.1230.option.3: "§H$desire_aura$§!"
 dionysian_story.1230.option.4: "§G$composer_aura$§!"
 dionysian_story.1230.option.5: "§M$whisperers_aura$§!"
 dionysian_story.1230.option.6: "Back"
 dionysian_change_aura_tooltip: "The §Y$PSIONIC_AURA$§! of our Empire will be changed"

 dionysian_story.1310.name: "Aura of Imperium"
 dionysian_story.1310.desc: "We have deceived the Patrons, we have mastered the profound mysteries of the hidden world. The Archons have broken free from reality, resided firmly in the Shroud, shaping their respective spiritual territories at will. Mortals still cannot remain there for long, but they are no longer limited to drawing power only from intermittent trickles. The psionic domain of our Empire is about to take shape, like a widely disseminated and indelible new consensus."
 dionysian_story.1310.option.a: "The glory of our Empire shall light the Galaxy"
 dionysian_story.1310.option.b: "The paths of our Empire shall connect the Shroud"
 dionysian_control_end_tooltip: "$dionysian_story.1210.option.d.tooltip$If our $PSIONIC_AURA$ changes, the §Y$edict_dionysian_control_shroud_menu$§! edict can be used to restore it to §Y$dionysian_overlord_aura$§!\n\n"
 dionysian_control_attunement_tooltip: "The §Y$edict_dionysian_control_shroud_menu$§! edict can be used to change our $PSIONIC_AURA$"
 dionysian_control_end: "Shroud Lord"
 dionysian_control_end_desc: "The Empire has obtained a psionic domain that cannot easily be disturbed."

