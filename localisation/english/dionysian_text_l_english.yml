 dionysian_relics_limit_tooltip: "Not all Relics can be consumed."
 
 dionysian_base.13.name: "Hide Portrait?"
 dionysian_base.13.desc: "The appearance and gender of [root.GetRulerName] have been shrouded in mystery for a considerable amount of time. Even the attendants and dignitaries of the Empire have deliberately remained ambiguous, avoiding spreading information about [Root.Ruler.GetHerHim] outwardly. Some conservative factions claim that we shouldn't relinquish this sense of mystery."
 dionysian_base.13.option.a: "Replace the portrait with the symbol of the [dionysian_empire.GetRulerTitle]"
 dionysian_base.13.option.b: "Replace the portrait with blank space"
 dionysian_base.13.option.c: "Prohibit this proposal"
 dionysian_base.13.option.d: "Cancel"
 dionysian_change_face_tooltip: "§RIrreversible§!\nThe portrait of [root.GetRulerName] will be changed.\n"
 dionysian_remain_face_tooltip: "§RIrreversible§!\nThe edict about hiding protrait will be removed.\n"

 dionysian_base.17.name: "The Glory"
 dionysian_base.17.desc: "Our [dionysian_empire.GetRulerTitle], reigning for millennia, commands significant respect across the Community. Leaders of nations heed [Root.Ruler.GetHerHis] speeches, nobles envy [Root.Ruler.GetHerHis] eternity, and the hive mind almost considers [Root.Ruler.GetHerHis] one of their own. There's an underlying sentiment: [root.GetRulerName] is the protagonist of history's stage. However, [Root.Ruler.GetSheHe] is also known for [Root.Ruler.GetHerHis] mastery in warfare and intrigue. Perhaps, all [Root.Ruler.GetHerHis] actions conceal intricate motives. It's challenging to dispel such doubts, fearing a new cycle of grand conquests. In the Community, the [dionysian_empire.GetRulerTitle] is both revered and feared."
 dionysian_base.17.option: "Not to be ignored"
 dionysian_community_dip: "Interstellar Machiavellian"
 dionysian_community_dip_desc: "The [dionysian_empire.GetRulerTitle] holds significant influence internationally."

 dionysian_base.19.name: "Rule over the Galaxy"
 dionysian_base.19.desc: "The current situation has long been within the expectations of many. Over two millennia ago, our continental Empire was entrusted to the Archons for governance. These individuals had the power to rule their territories and armies according to their preferences, with minimal responsibilities to the [dionysian_empire.GetRulerTitle]. In the subsequent centuries, [Root.GetRulerName] gradually diminished the Archons' privileges and strengthened centralized rule. Perhaps a similar history is poised to repeat across the entire galaxy."
 dionysian_base.19.option: "The reign of [root.GetRulerName] knows no bounds"

 dionysian_base.21.name: "Rule over the Shroud"
 dionysian_base.21.desc: "[root.GetRulerName] has already departed for [Root.Ruler.GetHerHis] throne in the Shroud, preparing to unleash destruction upon the reality. This story nears its conclusion, and [Root.Ruler.GetSheHe] grants us the strength to persevere until the end. Perhaps we shall step into immortality alongside [Root.Ruler.GetHerHim], claiming the powers of the gods as our own. Perhaps we too cannot survive in the wake of the Aetherophasic Engine, but from start to finish, escorting [Root.Ruler.GetHerHis] Ascension feels like an honor."
 dionysian_base.21.option: "For the glory of [root.GetRulerName]"

 dionysian_base.29.name: "The [dionysian_empire.GetRulerTitle]'s Wound"
 dionysian_base.29.desc: "The physical body of [root.GetRulerName] has been destroyed, yet [Root.Ruler.GetHerHis] consciousness endures in the Shroud. In time, [Root.Ruler.GetSheHe] will return to this world and reclaim our Empire. We can actively aid [Root.Ruler.GetHerHim] in gathering strength to hasten [Root.Ruler.GetHerHis] return. From the perspective of the radicals, we can seize the opportunity to break the [dionysian_empire.GetRulerTitle]'s shackles, eliminate [Root.Ruler.GetHerHis] followers in the reality, and gain freedom at any cost."
 dionysian_base.29.option.a: "We urgently need her rule"
 dionysian_base.29.option.b: "We must preserve her body"
 dionysian_base.29.option.c: "We will offer sacrifices"
 dionysian_base.29.option.d: "We will wait respectfully"
 dionysian_base.29.option.e: "Fortunately, there is a cloned spare body"
 dionysian_base.29.option.f: "§RA good opportunity to get rid of the [dionysian_empire.GetRulerTitle]§!"
 dionysian_revive_overlord_tooltip: "§GThe [dionysian_empire.GetRulerTitle] will recover from injuries immediately§!\n\n"
 dionysian_lock_overlord_tooltip: "§RThe [dionysian_empire.GetRulerTitle] will be confined to a life-support system§!\n\n"
 dionysian_revive_overlord_later_tooltip: "The [dionysian_empire.GetRulerTitle] will recover from injuries in two years\n\n"
 dionysian_kill_overlord_tooltip: "§RThe [dionysian_empire.GetRulerTitle]'s connection to the Empire will be severed, leading to serious consequences§!\n\n"

 #Archon
 dionysian_base.15.name: "Rise of an Archon"
 dionysian_base.15.desc: "§HAscendant Psychic§!\n\nThe Archons hold high positions and significant roles, all possessing extraordinary power. However, our Empire is rife with factions, and these overmans have long-held contradiction. If one Archon is to be elevated to the pinnacle of our government, careful consideration is essential. This individual stands out as a leader among them, enjoys widespread favor, and faces no apparent obstacles in their ascent.\n"

 dionysian_base.15.a: "Your unique trait has increased the upkeep."
 dionysian_base.15.a.response: "Indeed. In the past, the Archons were mostly luxurious and indulgent imperial lords, although our privileges have been reduced in the modern era. As long-lived beings, our conflicts and grudges are like tangled knots, difficult to unravel. Furthermore, the common populace is no longer restricted in information; with technological advancements, they have become particularly sensitive and united, while we remain consistently visible.\n\n§EAscension Perk §HImperial Theogony§! can reduce Archon's upkeep significantly, but it requires another adopted Ascension Perk.§!\n"
 dionysian_base.15.b: "Is there only one Archon for each kind of power?"
 dionysian_base.15.b.response: "Yes. Unless I perish, there won't be another Archon of the same kind. It's like a territory that is currently under my control.\n\n§EThe §Htrait's name§! shows the domain of current Archon.§!\n"
 dionysian_base.15.c: "How does an ordinary leader become an Archon?"
 dionysian_base.15.c.response: "Our race has a trait where ordinary individuals gradually gain psionic power in the process of achieving great deeds. This is the most common path to Ascension; many of my colleagues have followed this route.\n\n§EIncrease the §Hskill level§! of ordinary leaders. They have a chance of becoming Archons in this process.\n"
 dionysian_base.15.d: "Will the current event occur multiple times?"
 dionysian_base.15.d.response: "We all swear to fight for the glory of [root.GetRulerName], but our differences in specific approaches are quite severe. The [dionysian_empire.GetRulerTitle] often needs to put in considerable effort to ensure unified support for a certain Archon to run our Empire.\n\n§EEvery once in a while, a new Archon can be hired. The §H$councilor_dionysian_prime_minister$§! might also be an Archon.\n"
 dionysian_base.15.e: "Will your initial level increase?"
 dionysian_base.15.e.response: "We're not yet fully acquainted with the entirely new scenario of space; many are still employing traditional methods from the past few hundred years to address issues. Some individuals, of course, are unwilling to work on science ships, and a few hardliners refuse to interact with computers. Give us some more time to adapt, and the situation will eventually improve.\n\n§EThe §Hinitial level§! of Archons will increase over time.§!\n"

 dionysian_base.15.destiny: "§YIt seems quite comfortable to control destiny.§!"
 dionysian_base.15.destiny.response: "With just a thought from me, pedestrians might be smashed into minced meat by falling objects from the buildings, and beauties might pour out their love to beggars on the roadside. I can repeatedly make big profits at the casino and winning the lottery is not difficult at all. But I also encounter unexpected situations, unsure whether they are purely accidental or if I inadvertently unleashed psionic power. Perhaps causality is just an illusion, and I have had this feeling for a long time."
 dionysian_base.15.time: "§YTo what extent can you manipulate time?§!"
 dionysian_base.15.time.response: "The most typical application is to rewind time. I can replay this conversation dozens of times, gradually selecting the wording that elicits the best response from the audience. Ordinary people only have the concept of 'save' and 'load' in games, while I repeatedly experience similar mechanisms in reality. I have a reputation for having strategies for every situation in politics, and I almost always succeed in love. But I dare not be too casual, as I cannot guarantee flawless performance every moment. The first Archon of Time in history, Icarix, once used his power to deliberately seek favor from the [dionysian_empire.GetRulerTitle]. This disrespectful move was noticed, and he was assassinated by the Archon of Shadows that very night."
 dionysian_base.15.sercets: "§YAre you a mind reader?§!"
 dionysian_base.15.sercets.response: "Archons with the same title may still have more or less differences in power and personality. In the past, there were two vastly different Archons of Secrets: Kolynder was the Empire's earliest spymaster, his ears could eavesdrop on the thoughts of those walking around him, and his dark eyes could read the past of those standing before him; Nerat was a notorious soul-devouring monster, capable of directly plundering all the memories of his victims, gradually leading to a split in his personality. I am between these two seniors, how about keeping my specific abilities a secret for now?"
 dionysian_base.15.stone: "§YThe ability to manipulate stones is truly straightforward and sturdy.§!"
 dionysian_base.15.stone.response: "Throughout history, Archons of Stone have been steadfast and strong, with few peers able to directly challenge us. Our apprentices are equally reliable. The Empire has seen Earthshakers who can shatter city walls and tear apart mountain ranges, and Stone Knights where each member is a stony giant. Moreover, our traditional image has never been dull. Two thousand years ago, the Archon Carin was always abnormal. He was a hermit in the mountains before he became famous, silently fighting for the [dionysian_empire.GetRulerTitle], only to betray [Root.Ruler.GetHerHim] on the verge of victory. He transformed into a towering titan rampaging everywhere and was buried by the Edict of Stone. Perhaps this was the ending he desired?"
 dionysian_base.15.fire: "§YThe Archon of Fire is like a popular title.§!"
 dionysian_base.15.fire.response: "The Sigil of Fire is ancient, extensively studied by various nations long before the Empire was born. It may be one of the earliest arcane spells or psychic abilities we mastered. However, Archons of Fire often have short lives because occasional geniuses rise among the many Mages. A typical example of this is Thousand Embers and Sun Queen. The place where the two had their decisive battle has a long river of magma that continues to this day. Such life-and-death duels are no longer tolerated, and the burning scar has become a tourist attraction."
 dionysian_base.15.wind: "§YWhat is the use of your power?§!"
 dionysian_base.15.wind.response: "I can transform into a tornado that touches the sky and walks the earth, disperse into gusts that caress everything in an instant, ride on clouds drifting everywhere... I can even do three things at same time, and perhaps in the future, I could blow planets out of orbit. But with the advancement of technology, magic does show signs of becoming a relic. We must pursue stronger power, or else we will eventually be scorned, overthrown, and forgotten by mortals."
 dionysian_base.15.entropy: "§YThe domain you control is Entropy?§!"
 dionysian_base.15.entropy.response: "My apprentices can rust swords and disintegrate spacecraft, and my fingers can turn crying infants into crying oldsters. This may not necessarily be described as Entropy; there are perhaps more fitting words. However, mortal beliefs can influence our psionic power and physical bodies to some extent. Some Archons have been deeply feared for centuries, gradually transforming into monsters even in appearance. Essentially, the titles of Archons are not meant to reflect reality but to guide the masses, much like political propaganda."
 dionysian_base.15.dream: "§YHow do you view dreams?§!"
 dionysian_base.15.dream.response: "My dreams are a realm where I can do as I please, a perpetual temptation. About two thousand years ago, the Archon of Dream named Magno was addicted to sleep, often gathering with relatives and friends in his hallucinations. He was the first governor to be declared incompetence by the [dionysian_empire.GetRulerTitle]. However, considering his rare involvement in the bloody reality of our Empire, he may have been one of the closest to innocence."
 dionysian_base.15.war: "§YThe Archon of War, truly glorious.§!"
 dionysian_base.15.war.response: "Looking back at several Archons of War in history: Agathon, commander of the Imperial Guards; Blood Ruin, chieftain of the Southern Barbarians; and Ashe, father of the Disfavored Legion. They all have transcended mortal bounds by traversing mountains of corpses and seas of blood, and later, all have orchestrated countless massacres for the [dionysian_empire.GetRulerTitle]. Yet, Agathon's loyalty was immortalized in history, Blood Ruin's valor shaked the world, and Graven Ashe remembered the names of every soldier in his army, using magic to transfer their wounds to himself. We all have some heroic aspect, and such evaluations should be apt."
 dionysian_base.15.justice: "§YHow do you understand justice?§!"
 dionysian_base.15.justice.response: "In the past, the standard answer to this question was that justice existed in the laws of the [dionysian_empire.GetRulerTitle]. The first Archon of Justice, Tunon the Adjudicator, was a machine dedicated entirely to serving the [dionysian_empire.GetRulerTitle], almost a demigod devoid of personal desires. I admire his dedication; for over four hundred years, he maintained a solemn demeanor, wearing a mask to conceal his expressions. But now, it seems that the concept of justice should not be monopolized. I can affirm this."
 dionysian_base.15.rebirth: "§YThe Archon who guides vitality, comforting indeed.§!"
 dionysian_base.15.rebirth.response: "Most of my predecessors were healers, bringing life wherever they went. However, there are always exceptions: the healing power of Orphan Midwife sometimes drived patients into madness, and the artist Thalia can temporarily infuse spirituality into animals and plants. We often have strained relationships with the [dionysian_empire.GetRulerTitle], beacuse [Root.Ruler.GetSheHe] is the one who caused the most death and injury in history undoubtedly. Several Archons of Rebirth have been permanently imprisoned and had their powers drained for minor mistakes."
 dionysian_base.15.song: "§YWhat power lies within songs?§!"
 dionysian_base.15.song.response: "Emotions, beliefs, imagination, memories, these are all things I can manipulate. My subtle suggestions can compel listeners to obey urgently, and my music albums can influence the collective spirit. There was once an Archon of Song, Sirin, who attempted to command the [dionysian_empire.GetRulerTitle] to commit suicide with her melodies, nearly succeeding. She was treated as a tool for accumulating wealth by her father since childhood and later sold into the Imperial Palace, walking on thin ice."
 dionysian_base.15.virus: "§YWhat kind of person would become the Archon of Virus?§!"
 dionysian_base.15.virus.response: "The Archons of Virus are generally varying degrees of antisocial deviants. Among us, the most infamous is Ter, the founder of the Plague Monastery, who conducted experiments on civilians with the [dionysian_empire.GetRulerTitle]'s tacit approval. He claimed that he did so to eradicate his moral and pursue a state of ruthless cruelty. He was defeated and killed in battle against the Archon of Fire, the Self-burning Saint, a lesson I have to learn from."
 dionysian_base.15.shadows: "§YShadow is the domain of assassins, right?§!"
 dionysian_base.15.shadows.response: "My predecessors have killed the most Archons and countless unnamed mortals. We rarely govern a province or lead an army in the light. Among the historical works written by the Sage Lantry, one Archon of Shadows, Bleden Mark, is widely known. He attempted to assassinate the [dionysian_empire.GetRulerTitle] but failed, instead pledging allegiance to [Root.Ruler.GetHerHim]. He possessed lethal skills and charming demeanor, garnering numerous admirers in later generations."
 dionysian_base.15.slavery: "§YSlavery seems to be the domain of the [dionysian_empire.GetRulerTitle].§!"
 dionysian_base.15.slavery.response: "Calling the [dionysian_empire.GetRulerTitle] an Archon is like calling an Archon a mere mortal, which in the past would have cost one person's tongue. However, the [dionysian_empire.GetRulerTitle] indeed appears to be an Archon of Tyranny. I guess [Root.Ruler.GetSheHe] tolerates the existence of some evil Archons like me in the world, perhaps to divert the people's hatred. [Root.GetRulerName] attempts to portray [Root.Ruler.GetHerHim]self as someone who incarcerates and drives savage beasts. Without [Root.Ruler.GetHerHis] restraint, more ruthless sorcerers would mercilessly enslave sentient beings. Whether willingly or not, I must play the role of the antagonist."
 dionysian_base.15.wisdom: "§YThe Archon of Wisdom is likely a wise individual?§!"
 dionysian_base.15.wisdom.response: "Many of my predecessors were scholars and philosophers, masters of various schools of thought, and even prophets of civilization's progress. The ideologies of the [dionysian_empire.GetRulerTitle] and the grandeur of the Empire have both been significantly influenced by us. However, [Root.GetRulerName] remains as cunning as ever in this regard. Sometimes [Root.Ruler.GetSheHe] skillfully distorts the teachings of the Archons of Wisdom, or merely adopts certain aspects of them to serve [Root.Ruler.GetHerHis] own interests."
 dionysian_base.15.frost: "§YDo you have an ice-bound palace?§!"
 dionysian_base.15.frost.response: "When I'm happy, I summon snowfall, so everyone knows. During celebrations, I create ice sculptures resembling phoenixes or dragons and set them dancing in the sky above cities. The element I control no longer have much destructive power in the age of space. But I strive for artistic expression, living comfortably, at least not morally corrupt. There once was an Archon of Frost in history whose palace was filled with frozen beauties collected from various places."
 dionysian_base.15.death: "§YThe Archon of Death, perhaps infamous?§!"
 dionysian_base.15.death.response: "Some people attributed the passing of loved ones to me, while some suicides cursed me in their dying moments. But I welcome such infamy to some extent because the fear from people can enhance the power of us Archons. Some of my colleagues worry about losing their influence in the age of space, but I don't have to fret over that. Death is still inevitable for modern people."
 dionysian_base.15.light: "§YHonored to the utmost, the sovereign of radiant light.§!"
 dionysian_base.15.light.response: "Fear of darkness is almost innate to creatures, and the image of my predecessors has always been favorable in the eyes of the masses. Several previous Archons of Light were described as having immaculate skin and behaving like divine beings. However, this doesn't necessarily mean that we are virtuous; it simply makes it easier for us to gain political resources. Most of us still bow to the [dionysian_empire.GetRulerTitle], and in power struggles, we are not fundamentally different from other Archons."
 dionysian_base.15.thunder: "§YControlling thunder, it's a power that shakes hearts.§!"
 dionysian_base.15.thunder.response: "I can announce my name with booming thunder, much like the traditional Gods of Lightning. I can also linger within endless circuits, as the scientific revolution of the past few centuries has surrounded people with various types of machinery. In the modern era, many unprecedented Archons have emerged, such as Archon of Network and Archon of Games. My long-standing traditional skills have been updated accordingly, which is quite remarkable."
 dionysian_base.15.forge: "§YThe magic of forge must have a long history, right?§!"
 dionysian_base.15.forge.response: "Indeed, the Forge-Bounds have crafted weapons and armors for the Empire since long ago. These individuals used magical rituals to expand their senses, turning hammers and forges into additional limbs that they can control with ease. The Archons of Forge are of course more powerful than these followers; we can precisely control every detail of several factories, as if we have become Gestalt Consciousness. Historically, there were indeed three Archons who abandoned their physical bodies, transferring their consciousness to deep underground foundries to spend the rest of their lives there, where they could smelt extremely tough steel."
 dionysian_base.15.temptation: "§YWhat forms of temptation are there?§!"
 dionysian_base.15.temptation.response: "It's hard to sum up, really. It's better to ask how deep, complex, and dangerous the souls can be. Like the Archons of Temptation before me, I've been something of a seller of talents and bodies. Sometimes, I find the world intolerably mundane, while at other times, it seems filled with naive children begging for curious and whimsical gifts. I try to satisfy them because it's the power bestowed upon me, as if the devil are born to lead mortals astray."
 dionysian_base.15.order: "§YThe power of order undoubtedly contributes greatly to the Empire.§!"
 dionysian_base.15.order.response: "The Empire has spread across the continent around Year 400, and managing it properly has always been a challenge since ancient times. Many Archons were lords who indulged in pleasure within their territories, while my predecessors typically served as advisors to the [dionysian_empire.GetRulerTitle]. Common folk naturally believe: we are somewhat arrogant yet wise, using superhuman foresight and meticulous planning to achieve the happiness of the community. I can't say the reality matches this exactly, but I'll do my best to meet these expectations."
 dionysian_base.15.hatred: "§YMay your hatred be directed towards our enemies.§!"
 dionysian_base.15.hatred.response: "In truth, my abilities are quite diverse; igniting anger is just the most basic manifestation. It's more interesting to twist others into cruel, bloodthirsty beasts or vampires indulging in wanton carnage. Generally, my followers crave conflict; they care neither for their own dignity nor for the consequences of exterminating their prey. But we know to bow before the strong, and we will obey before the [dionysian_empire.GetRulerTitle] weakens."
 dionysian_base.15.insight: "§YWhat abilities do your Watchers possess?§!"
 dionysian_base.15.insight.response: "We can do more than just extract memories from skeletons like the Archon of Death; we can also see what happened in a certain place, learn about the experiences of the owner of an object. We are suited for adventurous archaeology; some Archons of Insight have achieved great success in this regard and then received commendation from the [dionysian_empire.GetRulerTitle], enjoying their later years in a castle. Perhaps I will repeat such experiences, spending my twilight years writing memoirs in a mansion on some distant planet."
 dionysian_base.15.nature: "§YCould the Archon of Nature be the leader of environmentalists?§!"
 dionysian_base.15.nature.response: "The rise of modern environmental movements has indeed strengthened my power and even changed our usual ways. Ancient Archons of Nature were mostly eccentric recluses who lived in swamps or forests all year round, ostensibly obeying the [dionysian_empire.GetRulerTitle] but in reality having little to do with the mundane world. Those predecessors lived quietly, surrounded by birds and beasts, probably never imagining that their successors would be giving speeches in the media and traveling among the stars."
 dionysian_base.15.foison: "§YAre you the harbinger of abundance?§!"
 dionysian_base.15.foison.response: "In modern terms, I'd be considered an agricultural expert, wouldn't I? Archons are almost incarnations of certain concepts. Agriculture has always been the foundation of civilization. I may not shine on the battlefield, but ample food always has its uses. In the past, I could even curse enemy crops, but with interstellar empires, that spell is obsolete."
 dionysian_base.15.wealth: "§YYou certainly possess extraordinary property.§!"
 dionysian_base.15.wealth.response: "Some are born Archons, others ascend to this title. Born Archons of Wealth are rare; most of my predecessors were legendary tycoons, who amassed wealth that shook the world and then ascended. Our existence signifies social inequality, yet our path among the Archons is relatively equal."
 dionysian_base.15.creation: "§YAre you an outstanding craftsman?§!"
 dionysian_base.15.creation.response: "I can turn stone into gold, and then gold into art. Without the succession of Archons of Creation and their apprentices, many magnificent buildings that have endured to this day would not exist in the Empire. Perhaps our power could reach even greater heights, reshaping the structure of the entire world, or creating new universes. This has certainly been a dream that has eluded realization for a long time."
 dionysian_base.15.rifts: "§YCan you control the Astral Rifts?§!"
 dionysian_base.15.rifts.response: "I can tear open and close extremely narrow Astral Rifts, while there are broader Rifts in the universe. If I could delve deeper into them, perhaps I would achieve another Ascension and become the Archon of Astral Planes... only to be eradicated by the [dionysian_empire.GetRulerTitle] due to the threat I posed. The strength of Archons may not always be comparable; long ago, there was a legendary Archon who was besieged by six other Archons and managed to kill five before her death. It is said that there have even been an Archon capable of issuing Edicts."

 dionysian_archon_become_negative_tooltip: "This Archon has a §Y50%§! chance of gaining a random §RNegative Trait§!"

 dionysian_archon.100.name: "Revealing Destiny"
 dionysian_archon.100.desc: "§Y[Root.GetName]§! prepares to perform a grand arcane ritual, by which the citizens of the empire will vaguely foresee their own fortunes, sensing how much happiness or suffering awaits them, and whether their desires and ideals can ever be fulfilled, as if reading the results of a medical examination. Such premonitions are not necessarily accurate, and Mages or Psychics may even overturn them entirely.\n\nOpponents worry about the social unrest this could bring. Since §Y[Root.GetName]§! can grant countless citizens an awakening to destiny, then why should [Root.GetSheHe] not also reveal the specific consequences of such an act?"
 dionysian_archon.100.a: "Eagerly anticipated"
 dionysian_archon.100.b: "Prohibit its enactment"
 dionysian_forsee_destiny_ritual: "Divinatory Ritual"
 dionysian_forsee_destiny_ritual_desc: "This nationwide divinatory ritual has proven greatly beneficial, though some citizens have nearly collapsed from the knowledge they gained."

 dionysian_archon.200.name: "The Final Retrospect"
 dionysian_archon.200.desc: "§Y[Root.GetName]§! has devised a new application for [Root.GetHerHis] magical Sigil, one that can precisely simulate the past experiences of the subject, revealing what outcomes each of their alternate choices might have led to. Yet the minds and bodies of ordinary mortals cannot withstand the immense strain of such a spell, and most test subjects perish within a short time. §Y[Root.GetName]§! does not intend to restrict this to limited use, and requests permission for its widespread dissemination. Perhaps some of the dying will glimpse other lives in their final moments; perhaps some of the desperate will offer everything to correct their mistakes, even if only within hallucinations."
 dionysian_archon.200.a: "Let it be as [Root.GetHerHis] wishes"
 dionysian_archon.200.b: "An absurd undertaking"
 dionysian_view_past: "Reenacting the Past"
 dionysian_view_past_desc: "The Sigil controlled by the Archon of Time allow the subject to relive scenes from their past and attempt different choices, but doing so inflicts near-fatal trauma upon mortals."

 dionysian_archon.800.name: "Dreamworld Genesis"
 dionysian_archon.800.desc: "§Y[Root.GetName]§! seeks to put his plan into action: linking together otherwise isolated dreams. Our long or fleeting dreams, our momentary flashes of imagination, all shall be merged into one, forming a grand world in constant upheaval, like a boundless network. Those who sleep will unconsciously provide its raw substance, while those awake may, through the Sigil of Dream, wander that realm, behold phantasms and illusions, and even embark on adventures to explore its marvels. The required psionic ritual have already been prepared."
 dionysian_archon.800.a: "A new tourist destination"
 dionysian_archon.800.b: "Utter nonsense"
 dionysian_created_dreamworld: "Merged Dreams"
 dionysian_created_dreamworld_desc: "The people's dreams intertwine, and within that wondrous world we come to understand one another."

 dionysian_archon.1200.name: "A Song to Awaken the True Desire"
 dionysian_archon.1200.desc: "§Y[Root.GetName]§!'s new composition has stirred intense debate among the general public. Rumors have long circulated that listeners who lose themselves in it undergo drastic changes of temperament, drawing from the chaos of their past memories and inner worlds to uncover who they were meant to become, and the obsessions they were meant to pursue, as if they had undergone a long period of meditation. Many hope to be guided back onto the right path and escape their muddled, drifting lives, while others fear that even their very nature might be arbitrarily controlled. §Y[Root.GetName]§! has yet to make a statement, and it may be that the current situation is merely the result of people deifying the Archons' powers to excess."
 dionysian_archon.1200.a: "Permit dissemination"
 dionysian_archon.1200.b: "It should be suppressed"
 dionysian_mental_revolution: "Mental Revolution"
 dionysian_mental_revolution_desc: "The minds of our citizens are under the powerful influence from the Archon of Song."

 dionysian_archon.1600.name: "Enlightenment"
 dionysian_archon.1600.desc: "§Y[Root.GetName]§! is researching a highly anticipated yet hotly debated new Sigil. Others may invoke its power to temporarily gain a machine-like calm and detached mind, suppressing agitation, doubt, or obsession, and focusing entirely on a preset goal. Some citizens eagerly welcome this, as it improves efficiency while lessening pain in their work, far surpassing ordinary refreshant. Critics, however, mock that this runs counter to the very concept of Wisdom and warn that perhaps before long, people will even turn themselves into machines just to keep their composure in romance."
 dionysian_archon.1600.a: "All the better"
 dionysian_archon.1600.b: "Permit application"
 dionysian_archon.1600.c: "Forbid application"
 dionysian_focus_sigil: "Sigil of Concentration"
 dionysian_focus_sigil_desc: "Thanks to the new Sigil created by the Archon of Wisdom, our social production efficiency has improved, but the mental state of many people has been negatively affected."

 dionysian_archon.1700.name: "Freezing and Melting"
 dionysian_archon.1700.desc: "The Archon of Frost, §Y[Root.GetName]§!, has deemed §Y[dionysian_archon_event_target_planet.GetName]§! in §Y[dionysian_archon_event_target_planet.star.GetName]§! system an ideal material awaiting sculpture, and [Root.GetHerHis] great power can bring forth dreamlike visions upon it. Countless lifelike ice sculptures will rise, perhaps reenacting the history of our empire from beginning to end, or perhaps giving false continuance to the enemies we have destroyed. Through such a feat, §Y[Root.GetName]§! will surely leave a godlike impression upon the hearts of the people, and [Root.GetHerHis] authority and magic will doubtless grow in turn."
 dionysian_archon.1700.a: "Grant permission"
 dionysian_archon.1700.b: "Such power should be used for terraforming"
 dionysian_archon.1700.c: "What a waste"
 dionysian_ice_realm: "Ice Art"
 dionysian_ice_realm_desc: "The Archon of Frost's unprecedented masterpiece draws attention both within and beyond."
 dionysian_ice_realm_unity_deposit: "Icy Realm"

 dionysian_archon.1900.name: "Lightweaver"
 dionysian_archon.1900.desc: "§Y[Root.GetName]§! wishes to reshape the light of §Y[dionysian_archon_event_target_planet_a.GetName]§!, so that from then on, day and night will no longer depend on the planetary motion, but instead on the will of the Archon. [Root.GetSheHeCap] can summon towering pillars of light, shower down rains of light, and even unleash a luminous tornado; wherever it passes becomes day, and wherever it has not yet reached remains night. This arrogant attempt to imitate the Edicts has already given rise to many quiet whispers."
 dionysian_archon.1900.a: "This is [Root.GetHerHis] domain after all"
 dionysian_archon.1900.b: "Relocate the project to §Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.1900.c: "Relocate the project to §Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.1900.d: "A delusion born of hubris"
 dionysian_controlled_light: "Controlled Light"
 dionysian_controlled_light_desc: "The light of this planet has been claimed by an Archon."

 dionysian_archon.2000.name: "Techno-Fairies"
 dionysian_archon.2000.desc: "When the scientific revolution shook the empire centuries ago, some unwilling-to-yield Mages and Archons insisted that many wondrous inventions were driven in secret by bound spirits rather than being products of mere mortals. Now the Archon of Thunder, §Y[Root.GetName]§!, can make such strange tales come true. [Root.GetHerHis] Sigil can temporarily seal the subject's soul within machines, supplying them with energy and increasing their efficiency. A new form of labor will arise from this: workers need only endure the mental strain of having their consciousness imprisoned within machines, though this may be no different from creating living batteries."
 dionysian_archon.2000.a: "This will aid our evolution"
 dionysian_archon.2000.b: "Worth a try"
 dionysian_archon.2000.c: "A violation of morality"
 dionysian_efficient_machines: "Efficient Machines"
 dionysian_efficient_machines_desc: "Machines operate more efficiently thanks to the workers who give up their freedom."

 dionysian_archon.2100.name: "Forging the Titans"
 dionysian_archon.2100.desc: "§Y[Root.GetName]§!'s labor of devotion has at last reached completion. The new warforms [Root.GetSheHe] has invented can serve as personal vessels for each of the Archons, built to match their masters, such as a magnificent mecha or a fearsome beast. They can also operate independently, consuming vast amounts of energy. The production of these warforms requires the personal involvement of §Y[Root.GetName]§!, and [Root.GetHerHis] political rivals accuse [Root.GetHerHim] of harboring treacherous intent."
 dionysian_archon.2100.a: "Exquisite beyond compare"
 dionysian_archon.2100.b: "Nothing but scrap metal"
 dionysian_forge_army: "Psionic Warform"
 dionysian_forge_army_plural: "Psionic Warforms"
 dionysian_forge_army_desc: "Combat platforms constructed exclusively for the Archons of our Empire."
 dionysian_forge_army_tooltip: "Permits building §Y$dionysian_forge_army$§! armies at our capital.\nWhen stationed on a planet or assigned to a fleet led by an §YArchon§!, their basic upkeep is reduced by §Y50%§!."

 dionysian_archon.2300.name: "Invisible Discipline"
 dionysian_archon.2300.desc: "§Y[Root.GetName]§!, the Archon of Order, claims that [Root.GetHerHis] arcane art will promote the prosperity of §Y[dionysian_archon_event_target_planet_a.GetName]§!. Once performed, the local inhabitants' habits and behaviors will be subtly altered without their awareness: more regular routines, healthier amusements, more harmonious social interactions... Not all of these changes are necessarily positive. Some people may develop strange quirks that seem meaningless yet benefit the community; some innocents may willingly take on backbreaking labours, believing it to be their heart's true desire; and some of the inept may long to resign from their work or even end their own lives. The ethical issues are self-evident, yet §Y[Root.GetName]§! promises that the colony's productivity and security will be eventually improved to the utmost degree."
 dionysian_archon.2300.a: "A groundbreaking achievement"
 dionysian_archon.2300.b: "Relocate the project to §Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2300.c: "Relocate the project to §Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2300.d: "Such an attempt must be condemned"
 dionysian_mystic_rule: "Mystic Protocols"
 dionysian_mystic_rule_desc: "This colony has been marked by the Archon of Order, causing its inhabitants to unknowingly act in ways that benefit the greater whole."

 dionysian_archon.2400.name: "Blood Sacrifice"
 dionysian_archon.2400.desc: "It is true that many citizens rejoice at being born into our Empire, take deep pride in our achievements, and willingly dedicate themselves. Yet diligent labor can seem mundane, political debate can feel elusive and hollow, and taking to the battlefield demands the endurance of great suffering. The Archon of Hatred, §Y[Root.GetName]§!, now seeks to show the selfless a shortcut to glory. The chosen citizens on §Y[dionysian_archon_event_target_planet.GetName]§! will perish painlessly in a psionic ritual, becoming fuel for the Empire. Their heroic deeds will be woven into our grand work."
 dionysian_archon.2400.a: "Duty compels us"
 dionysian_archon.2400.b: "Carry out the ritual"
 dionysian_archon.2400.c: "Cruel fanatic" 
 dionysian_imperial_martyrs: "Imperial Martyrs"
 dionysian_imperial_martyrs_desc: "Those who ended their lives have strengthened our industry and resolve."
 dionysian_archon.2400.a_tooltips: "The colony will lose §R800§! £pop£ Pops\n\n"
 dionysian_archon.2400.b_tooltips: "The colony will lose §R500§! £pop£ Pops\n\n" 

 dionysian_archon.2500.name: "History Browser"
 dionysian_archon.2500.desc: "§Y[Root.GetName]§!, the Archon of Insight, seeks to apply [Root.GetHerHis] newly invented device that allows its user to be virtually transported to specific moments and locations in the past, witnessing every detail as it truly occurred. The field of sociology will clearly benefit from this, and entirely new forms of entertainment may emerge. Our citizens could enjoy the lives of the ancients as easily as browsing a video-sharing network. Yet censorship would become extraordinarily difficult: countless secrets would inevitably be exposed, and the official historical narratives might collapse altogether. Some now wonder: are our every move and thought already being watched by innumerable descendants?"
 dionysian_archon.2500.a: "Authorize public access"
 dionysian_archon.2500.b: "Restrict to academia"
 dionysian_archon.2500.c: "Offer no response"
 dionysian_watch_history_1: "Observing History"
 dionysian_watch_history_1_desc: "We can now directly experience and examine the details of historical events."
 dionysian_watch_history_2: "$dionysian_watch_history_1$"
 dionysian_watch_history_2_desc: "$dionysian_watch_history_1_desc$"

 dionysian_archon.2600.name: "Chimeric Beasts"
 dionysian_archon.2600.desc: "The Archon of Nature is conducting secret research to fuse our Empire's ordinary animals into strange new creatures. They require psionic energy to maintain their forms, and some of these chimeric beasts display both wondrous and disturbing traits, such as multiple heads, each with its own consciousness, or a few active organs animating a lifeless corpse. We must decide how far this sorcery should be applied, from experimental subjects to household pets."
 dionysian_archon.2600.a: "Provide full support"
 dionysian_archon.2600.b: "Partial approval"
 dionysian_archon.2600.c: "Ignore it"
 dionysian_merge_animals_1: "Fusion Experiments"
 dionysian_merge_animals_1_desc: "The latest experiments by the Archon of Nature have advanced our biological research."
 dionysian_merge_animals_2: "$dionysian_merge_animals_1$"
 dionysian_merge_animals_2_desc: "$dionysian_merge_animals_1$"

 dionysian_archon.2800.name: "Property of Fantasy"
 dionysian_archon.2800.desc: "From ancient times to the present, how many poor and humble people have yearned for wealth and splendor? §Y[Root.GetName]§! is preparing to conduct a social experiment, using psionic power to satisfy the most frenzied of delusions. The people of §Y[dionysian_archon_event_target_planet_a.GetName]§! will conjure up their desired luxuries simply by clearly and boldly conceiving them. However, when their spirits waver slightly, and emotions like boredom, guilt, or satisfaction take over, these fantasies vanish. Those driven by greed who have heard the rumors are already eager to try, desperate to experience a heaven-like life born from their own minds."
 dionysian_archon.2800.a: "Why not?"
 dionysian_archon.2800.b: "Relocate the project to §Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2800.c: "Relocate the project to §Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2800.d: "Our citizens are not toys"
 dionysian_materialized_desire: "Materialized Desire"
 dionysian_materialized_desire_desc: "The inhabitants of this planet can create and maintain what they desire through thought alone."

 dionysian_archon.2900.name: "Animated Cities"
 dionysian_archon.2900.desc: "The Archon of Creation and the Archon of Mind have jointly presented blueprints. Their mysteries could transform the cities of §Y[dionysian_archon_event_target_planet_a.GetName]§! into living beings. Streetlights would adjust their brightness to greet passersby, signs would change their lettering to express emotions, chairs would walk on four legs, televisions would converse with us, and skyscrapers would grow on their own like mechanical Gestalt. But will these newborn entities harm our citizens or even betray our Empire?"
 dionysian_archon.2900.a: "Strongly support"
 dionysian_archon.2900.b: "Relocate the project to §Y[dionysian_archon_event_target_planet_b.GetName]§!"
 dionysian_archon.2900.c: "Relocate the project to §Y[dionysian_archon_event_target_planet_c.GetName]§!"
 dionysian_archon.2900.d: "We require more practical project"
 dionysian_living_city: "Animated Cities"
 dionysian_living_city_desc: "On this colony, every element of the cities possesses a certain degree of self-awareness and agency."

