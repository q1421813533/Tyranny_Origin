 dionysian_base.2.name: "Reign of the [dionysian_empire.GetRulerTitle]"
 dionysian_base.2.desc.1: "[Root.GetSpeciesName] has endured numerous social changes, and [Root.GetRulerName] has achieved countless great feats. Many theories have sought to describe [Root.Ruler.GetHerHis] true nature, and many rebellions have tried to overthrow [Root.Ruler.GetHerHis] transcendent rule. Is the [Root.GetRulerTitle] an unfathomable deity, a survivor of a precursor civilization, a masterful deceiver, or a tyrant long defeated and replaced by a hero? Whatever the truth, [Root.Ruler.GetHerHis] prestige is unmatched, and [Root.Ruler.GetHerHis] governance follows certain discernible patterns.\n\n$dionysian_base.2.desc.newlumina_tooltip$"
 dionysian_base.2.desc.2: "The Empire's recent pace of expansion is unparalleled in our history. At the same time, the [dionysian_empire.GetRulerTitle]'s prestige has reached unprecedented heights. We could seize this opportunity to reform the government, building more efficient institutions to better carry out [Root.Ruler.GetHerHis] will. To go with the flow will please the masses, but to go against it is not impossible either.\n\n$dionysian_base.2.desc.newlumina_tooltip$"
 dionysian_base.2.desc.3: "The Empire's recent pace of expansion is unparalleled in our history. At the same time, the [dionysian_empire.GetRulerTitle]'s prestige has reached unprecedented heights. We could seize this opportunity to reform the government, building more efficient institutions to better carry out [Root.Ruler.GetHerHis] will. To go with the flow will please the masses, but to go against it is not impossible either.\n\n$dionysian_base.2.desc.endlumina_tooltip$"
 dionysian_base.2.desc.newlumina_tooltip: "§EThe §Gimprovement§! and §Rworsenment§! of the §Y$leader_trait_dionysian_overlord$ Trait§! will affect the time it takes to gain the next §YLuminary Ruler Trait§!.§!"
