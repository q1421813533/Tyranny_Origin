 leader_trait_dionysian_exarch_desc: "This leader shows signs of Ascension, possessing the potential to become an Archon, given [This.GetHerHis] mastery reaches its peak."
 leader_trait_dionysian_archon_common_text: "This leader has ascended to become an Archon, mastering and commanding a particular aspect of psychic power. Death will only visit this individual far into the future."
 leader_trait_dionysian_archon_destiny_desc: "The Sigil of Destiny governs causality. The Archon of Destiny decides what is chance and what is fate, ruling over both hope and despair."
 leader_trait_dionysian_archon_time_desc: "The Sigil of Time connects past and future, regression and progression. The Archon of Time can shake the foundations of history and foresee the tides of change."
 leader_trait_dionysian_archon_sercets_desc: "The Archon of Secrets is a master of uncovering truths and executing conspiracies. [This.GetSheHe] typically commands numerous agents and controls the Empire's intelligence network."
 leader_trait_dionysian_archon_stone_desc: "The Sigil of Stone shapes sand, soil, and hill. The Archon of Stone can transform into a living peak, effortlessly raising or toppling wonders."
 leader_trait_dionysian_archon_fire_desc: "The Sigil of Fire channels psionic flames from the Shroud, corroding metal and melting reason."
 leader_trait_dionysian_archon_wind_desc: "The Archon of Wind commands the drift of clouds and even the turning of sky."
 leader_trait_dionysian_archon_entropy_desc: "The Sigil of Entropy concerns decay, calamity, and obliteration. The Archon of Entropy is the herald of the end."
 leader_trait_dionysian_archon_dream_desc: "This Archon has power over dreams, invading the mental realms of sleepers."
 leader_trait_dionysian_archon_war_desc: "The Archon of War has proven [This.GetHerHis] martial prowess and tactical genius. Under [This.GetHerHis] command, soldiers will have honorable endings."
 leader_trait_dionysian_archon_justice_desc: "The Archon of Justice upholds law and punishes evil. [This.GetHerHis] verdicts cause sinners to reap what they sow, sometimes even bringing down entire cities in judgment."
 leader_trait_dionysian_archon_rebirth_desc: "The Archon of Rebirth channels psionic power to dispel pain and heal both body and mind."
 leader_trait_dionysian_archon_song_desc: "The Archon of Song can command others through voice and will. [This.GetSheHeCap] is often a masterful singer, poet, or artist, able to stir emotions with ease even without psionic power."
 leader_trait_dionysian_archon_virus_desc: "This Archon reigns over disease and plague."
 leader_trait_dionysian_archon_shadows_desc: "The Archon of Shadows possesses unfathomable nature and peerless skill, a master assassin who strikes from darkness and kills in a single blow."
 leader_trait_dionysian_archon_slavery_desc: "The Archon of Slavery is the embodiment of ruthless governing, a sovereign before whom many kneel and obey."
 leader_trait_dionysian_archon_wisdom_desc: "This Archon seeks enlightenment in both the reality and the Shroud."
 leader_trait_dionysian_archon_frost_desc: "The Sigil of Frost pertains to the mystery of freezing and stasis. The Archon of Frost can preserve a body intact for centuries, or render a creature forever conscious yet forever immobilized."
 leader_trait_dionysian_archon_death_desc: "The Sigil of Death governs corpses and souls. The Archon of Death commands bleached skeletons and wandering spirits."
 leader_trait_dionysian_archon_light_desc: "The Sigil of Light concerns illumination, virtue, and ideals. This art can guide one toward a grand fate."
 leader_trait_dionysian_archon_thunder_desc: "The Sigil of Lightning deals with electric force. The Archon of Thunder has the power to shake heaven."
 leader_trait_dionysian_archon_forge_desc: "The Archon of Forge once was a forger of artifacts and now is a creator of spacecrafts. The ever-expanding industrial complex of the Empire is nearly an extension of [This.GetHerHis] body."
 leader_trait_dionysian_archon_temptation_desc: "This Archon commands illusion. [This.GetSheHeCap] leads followers to taste joy and agony, unlocking doors to the unknown."
 leader_trait_dionysian_archon_order_desc: "The Archon of Order regulates the workings of the world. The spread of plant life, the routines of the masses, even the pace of the seasons, all are, to varying degrees, subject to [This.GetHerHis] influence."
 leader_trait_dionysian_archon_hatred_desc: "The Archon of Hatred governs hostility and conflict. [This.GetHerHisCap] arrival stirs the urge to fight. Cowards find courage, friends grow suspicious."
 leader_trait_dionysian_archon_insight_desc: "This Archon uncovers the past, revealing the truths of history and exploring lost civilizations."
 leader_trait_dionysian_archon_nature_desc: "The Archon of Nature is a druid-like psychic, sovereign over plants and beasts."
 leader_trait_dionysian_archon_foison_desc: "This Archon is intimately connected to agriculture. [This.GetHerHisCap] reign brings fertile soil and bountiful crops."
 leader_trait_dionysian_archon_wealth_desc: "The Archon of Wealth manifests [This.GetHerHis] presence in currency and banking, becoming nearly a living symbol of capitalism."
 leader_trait_dionysian_archon_creation_desc: "This Archon can shape matter to a considerable degree, imbuing the real world with fantastical colors"
 leader_trait_dionysian_archon_rifts_desc: "The Sigil of Space implies the unity of all things. The Archon of Rifts manipulates the anomalies of the Astral Planes, overturning the laws of the current cosmos."

