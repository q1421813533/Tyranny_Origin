 #Story
 dionysian_story.50.name: "The Call Beyond Reality"
 dionysian_story.50.desc: "The Archons of our Empire feel the allure of the Shroud more strongly than ever, as if it were a longed-for homeland or an unforgettable riddle. We must explore the mists and shadows to come into contact with the hidden spirits. Powerful beings may lurk in the depths, covertly influencing the universe. Yet we cannot serve a new master. We must forge our own path."
 dionysian_story.50.option: "Our Empire will expand into the Shroud"
 dionysian_explore_shroud_tooltip: "After completing the §Y$SHROUD_SHAPING_PROJECT$§! project and acquiring the §YCovenant Power§! of four Patrons, we will be able to create our own §Y$PSIONIC_AURA$§!.\n"

 dionysian_story.100.name: "Development of Psi Corps"
 dionysian_story.100.desc: "The Archons have always been pioneers and dominators in the field of psionic power. In the past, ordinary people must rely on the Sigils from them to cast magic. However, after the Great Awakening, this necessity no longer exists. Now, anyone is a psychic.\n\nThese newcomers are widely scattered across various industries, lacking experience and exhibiting significant diversity. Empowering Archons to organize them would undoubtedly improve productivity. We can also choose to rely more on the masses, taking advantage of the situation to balance and weaken Archons."
 dionysian_story.100.option.a: "Empower the Archons to lead Psi Corps"
 dionysian_story.100.option.b: "Maintain the unity of Psi Corps"

 dionysian_empower_archons: "Diverse Psi Corps"
 dionysian_empower_archons_desc: "The Archons are allowed to form their own legions, just like old times."
 dionysian_empower_psykers: "Unified Psi Corps"
 dionysian_empower_psykers_desc: "The nationwide unified Psi Corps have enhanced social cohesion."
 dionysian_empower_psykers_tooltip: "$MOD_EMPIRE_SIZE_POPS_MULT$: §G-10%§!\nArchon Upkeep: §G-100%§!\n"

 dionysian_story.200.name: "Relocation of Capital"
 dionysian_story.200.desc: "Our homeworld nurtures species, carries the past, and silently watches [Root.Owner.Ruler.GetName] since ancient times, long plagued by [Root.Owner.Ruler.GetHerHis] Edicts. There have been many relocations of capital throughout history, and now it involves [Root.Owner.GetHomeWorldName] itself. We can encourage citizens to leave the scarred homeworld, or transform this planet into the cultural center of our Empire."
 dionysian_story.200.option.a: "Encourage emigration"
 dionysian_story.200.option.b: "Transform industry"
 dionysian_story.200.option.c: "Do not intervene"

 dionysian_moving_homeworld: "Emigration Propaganda"
 dionysian_moving_homeworld_desc: "Attempts to end Edicts still lack progress to this day, and people instead seek new homes."
 dionysian_remember_homeworld: "Land of Origin"
 dionysian_remember_homeworld_desc: "The birthplace of a civilization. The story of a mystic begins from here."
 dionysian_new_capital: "New Capital"
 dionysian_new_capital_desc: "The Imperial Palace and the government have been relocated, and the entire nation is paying attention to this planet."

 dionysian_story.301.name: "Old Master of the Galaxy"
 dionysian_story.301.desc: "[dionysian_contact_fallen_empire.GetName] is merely a shadow of ancient titan, yet it is enough to shake our civilization. People question whether the origin of [root.GetRulerName] is related to it, whether [Root.Ruler.GetHerHis] Edicts can prevent its aggression, and whether [Root.Ruler.GetHerHis] prolonged rule might be abruptly ended by an extraterrestrial power... The optimism in society has diminished.\n\nMeanwhile, the voices opposing the status quo are growing louder. The Fallen Empire has proven that a species can endure for centuries on its own strength, without the need for an [dionysian_empire.GetRulerTitle] or Archons."
 dionysian_story.301.option.a: "Strengthen control"
 dionysian_story.301.option.b: "Let things take their course"
 dionysian_story.301.option.c: "Support the radicals"

 dionysian_fallen_info_control: "Enhanced Control"
 dionysian_fallen_info_control_desc: "We have decided to withhold information about the Fallen Empire from the public, focusing on stringent review systems."

 dionysian_fallen_info_ignore: "Political Indifference"
 dionysian_fallen_info_ignore_desc: "We do not care how information about the Fallen Empire might affect current political landscape."

 dionysian_fallen_info_support: "Calls for Change"
 dionysian_fallen_info_support_desc: "The mass movement is intensifying, with people increasingly questioning the authority of the [dionysian_empire.GetRulerTitle] and Archons."

 dionysian_story.401.name: "Leviathan of the Star Sea"
 dionysian_story.401.desc: "Our ancestors exorcised the Bane of Shroud and conquered the nations of homeworld. While the [dionysian_empire.GetRulerTitle]'s promise of enduring peace may be riddled with flaws, there have been no shortage of glorious battles over the past thousands of years. The recently discovered Guardian has stirred public enthusiasm. Destroying such a formidable foe would be an achievement surpassing those of the past, and people have already begun to envision the result of its defeat."
 dionysian_story.401.option.a: "We should hunt it down"
 dionysian_story.401.option.b: "May the [dionysian_empire.GetRulerTitle] protect us"

 dionysian_levi_hot: "Public Enthusiasm"
 dionysian_levi_hot_desc: "A recent event has sparked widespread excitement throughout society."

 dionysian_story.501.name: "Conquer the Reality"
 dionysian_story.501.desc: "Our recent decision has sparked widespread discussion, with one theory in particular gaining significant attention. Archons are unparalleled distorters of reality, capable of aiding the Empire in unraveling the mysteries of universe and exploring advanced logic. However, even they will suffer in this process, and the entire elite group will harbor resentment as a result. Relatively weaker Archons may risk exhausting their psionic power and perishing. Should we proceed with this plan?"
 dionysian_story.501.option.a: "Archons are pioneers of our Empire and should dedicate themselves"
 dionysian_story.501.option.b: "Archons are pillars of our Empire and must not be depleted"

 dionysian_story.601.name: "Flesh Revolution"
 dionysian_story.601.desc: "We have started to push mechanized transformation into the social sphere, and numerous issues have arisen in rapid succession, especially concerning the preservation of psionic power. They are closely tied to flesh, and simply installing cyberwares will stifle the potential of most psychics. However, the Archons' privileges have already been inscribed in Shroud during their Ascension. Their power has never been constrained by physical form; rather, it shapes their physical form accordingly. Since the Industrial Revolution, our Empire has seen several Archons of Machine with bodies of steel and iron.\n\n"
 dionysian_story.601.desc.cyb: "$dionysian_story.601.desc$Overall, these sorcerers do not largely reject the imminent revolution. We can also heed more cautious conservative views and treat them as exceptions without installing cybernetic implants."
 dionysian_story.601.desc.syn: "$dionysian_story.601.desc$We are prepared to provide these sorcerers with specially designed mechanical bodies, which come in two basic modes. One mode is more conducive to the exercise of their psionic power, while the other better leverages the technological advantages of synthetic beings."
 dionysian_story.601.option.a: "We will make a choice"

 dionysian_story.701.name: "Proclamation to the Galaxy"
 dionysian_story.701.desc: "The radicals within the country once optimistically speculated that the Edicts could not reach the distant stars, thus believing that the space age would be their opportunity to defeat the [dionysian_empire.GetRulerTitle]. In hindsight, this was a naive form of self-consolation. Celestial bodies are equally under [Root.Ruler.GetHerHis] control, just as the land once cracked under [Root.Ruler.GetHerHis] decree. Some people remain silent out of fear, some worry that the Galaxy will eventually become riddled with scars, while others express their joy with fervent enthusiasm.\n\nRegardless, we still possess the advantage that has existed since ancient times, as if standing in an invincible position."
 dionysian_story.701.option: "The [dionysian_empire.GetRulerTitle] is still with us"
 
 dionysian_story.800.name: "Humiliating Failure"
 dionysian_story.800.desc: "We have been defeated by [From.GetName], casting doubt on the [dionysian_empire.GetRulerTitle]'s profound wisdom and terrifying power. [Root.Ruler.GetHerHisCap] notorious deeds are being fiercely attacked, while [Root.Ruler.GetHerHis] good governance seems insignificant in comparison. War has always been a major cause of the empire's collapse, and we will face inevitable turmoil."
 dionysian_story.800.option.a: "Is [root.GetRulerName] an empty tyrant?"
 dionysian_story.800.option.b: "This is the fault of the current government"

 dionysian_story.900.name: "Kneeling in Surrender"
 dionysian_story.900.desc: "[root.GetRulerName], the Wearer-of-many-crowns, has submit to [From.GetName]. Our Empire has become a vassal."
 dionysian_story.900.option.a: "This is the end of glorious era?"
 dionysian_story.900.option.b: "Prohibit reckless remarks"

 dionysian_story.1001.name: "Vanquishing the Fallen Empire"
 dionysian_story.1001.desc: "The stars gaze and whisper about the fall of [dionysian_fallen_empire_capital.GetName], showing the glory of [root.GetRulerName]. We have dealt a significant blow to the old masters of the Galaxy, who were akin to gods; perhaps we can ascend to an even higher realm. Even the staunchest opponents find it hard to deny the value of this act, albeit with trembling hearts. Meanwhile, the public's emotions are increasingly high and fervent, venerating the [dionysian_empire.GetRulerTitle] and Archons."
 dionysian_story.1001.option: "A new achievement on our Empire's monument"

 dionysian_story.1100.name: "Our Bond Grows Deeper"
 dionysian_story.1100.desc: "[Root.GetRulerName] was once the reclusive ruler of all, [Root.Ruler.GetHerHis] true form hidden within the Imperial Palace, yet the silent and invisible sense of oppression seemed to be everywhere. Now, [Root.Ruler.GetHerHis] power is greater than ever, nearly pervading the entire Empire. People no longer need to see [Root.Ruler.GetHerHis] banners or officials to vaguely perceive the elusive will of the [dionysian_empire.GetRulerTitle].\n\nFollowers of the Shroud Patrons will build their own sanctuaries, and we can use a similar structure to strengthen [Root.Ruler.GetHerHis] influence. In ancient times, the Fatebinders would carry the [dionysian_empire.GetRulerTitle]'s Edicts to specified regions, where they would release the disasters contained within. Our telepaths can similarly serve as mediums for [Root.Ruler.GetRulerName]."
 dionysian_story.1100.option: "Our Empire"
 dionysian_story.1100.tooltip: "Our telepaths now produce additional £unity£ Unity.\n\nWe can now build a £building£ §YSanctum of the Overlord§! on one of our planets."

 dionysian_enhance_telepath_modifier: "Empire's Bond"
 dionysian_enhance_telepath_modifier_desc: "Our telepaths can serve as mediums for transmitting the [dionysian_empire.GetRulerTitle]'s power."

 dionysian_story.1200.name: "Treasures of the Shroud"
 dionysian_story.1200.desc: "Perhaps the Shroud contains the reflections or archetypes of all things, with countless mysterious secrets waiting to be discovered. Perhaps one day, [Root.GetSpeciesNamePlural] will ascend to that heaven, banish the gods, and reshape the universe. This is no mere delusion; [root.GetRulerName] can tame the chaos temporarily, extracting the resources we desire from it."
 dionysian_story.1200.option: "The [dionysian_empire.GetRulerTitle] surpasses the gods who crave sacrifices"
 dionysian_story.1200.tooltip: "§HUnlocks Edict: §!$edict_dionysian_control_shroud_menu$"

 edict_dionysian_control_shroud_menu: "Reveal Shroud"
 edict_dionysian_control_shroud_menu_desc: "We can control this boundless realm."
 dionysian_control_shroud_menu_tooltip: "Open the list to interact with §YShroud§! costing £menace£ §YMenace§!."

 dionysian_story.1210.name: "§!$edict_dionysian_control_shroud_menu$"
 dionysian_story.1210.desc: "The other world is more or less within our dominion. Its currents can be guided and shaped by our power, just as the Edicts can rewrite this world."

 dionysian_story.1210.option.a: "§YRemove Blight§!"
 dionysian_story.1210.option.a.tooltip: "Remove all the §YShrouded Blight§! we are currently suffering"
