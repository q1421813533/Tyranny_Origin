 #Election
 dionysian_election.0.name: "Imminent Election"
 dionysian_election.0.desc: "Generally, the parliament should hold elections every ten years, leading to the appointment of a new [dionysian_empire.GetHeirTitle] and Cabinet members. Political parties have already activated their propaganda machinery, rallying the masses, and political issues are increasingly prevalent in the news media. Demonstrations and speeches occasionally appear on every street corner, with fringe factions and extremist groups gaining some ground. Hearts and minds are in flux, contradictions arise, and debates intersect. The nation will momentarily have little respite, deliberate manipulation and fraud could lead to more severe consequences.\n\nThe ultimate winner must find a way to stand firm, perhaps through appropriate compromise and reconciliation, or maybe by taking a strong stance to suppress dissent. Otherwise, chaos may become inevitable."
 dionysian_election.3.name: "Emergency Election"
 dionysian_election.3.desc: "With the departure of the [dionysian_empire.GetHeirTitle], the successor must immediately take control of the situation. The nation's unity faces a test, and the current system might waver."
 dionysian_election.0.option1: "Conduct the election as scheduled"
 dionysian_election.0.option2: "Maintain the current political party"
 dionysian_advance_election_title: "Imminent Election"

 edict_dionysian_advance_election: "Conduct Early Elections"
 edict_dionysian_advance_election_desc: "Announcing the dissolution of parliament, calling for a re-election. It won't be possible to do this again in the short term."

 dionysian_PM_compete: "§Y[Root.dionysian_old_PM_lose_chance]%§! New [dionysian_empire.GetHeirTitle] will rise\n§Y[Root.dionysian_old_PM_win_chance]%§! Current [dionysian_empire.GetHeirTitle] will stay\n\n"
 dionysian_election_resource_1: "§EIf the Influence is less than 100, our Empire will fall into disarray.§!\n\n" 
 dionysian_election_resource_2: "§RIf the Influence is less than 200, our Empire will fall into turmoil.§!\n\n"

 dionysian_party_time: "Term of Government"
 dionysian_party_time_desc: "After the term ends, there will be parliamentary elections, possibly resulting in a new [dionysian_empire.GetHeirTitle] taking control of the Empire."
 dionysian_always_PM: "\nWhen there's no current [dionysian_empire.GetHeirTitle], a new [dionysian_empire.GetHeirTitle] will inevitably emerge."

 dionysian_advance_election_cooldown: "Cooled Political Enthusiasm"
 dionysian_advance_election_cooldown_desc: "We cannot hold early elections during this period."
 dionysian_election_chaos: "Political Disarray"
 dionysian_election_punish: "Political Turmoil"
